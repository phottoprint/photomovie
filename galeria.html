<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOWNLOAD - Photo Movie</title>
    <style>
        :root { 
            --turquesa-dark: #003333; 
            --dourado: #c5a059;      
            --dourado-fosco: #8e6d2d;
        }
        
        body { 
            margin: 0; 
            background: var(--turquesa-dark); 
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            margin-top: 20px;
        }

        .header h1 {
            color: var(--dourado);
            font-size: 32px;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* Container do Vídeo */
        .video-preview {
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid var(--dourado);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            background: #000;
        }

        video {
            width: 100%;
            display: block;
        }

        /* Botão Dourado de Baixar */
        .btn-download {
            margin-top: 40px;
            width: 100%;
            max-width: 320px;
            padding: 20px;
            border-radius: 50px;
            background: linear-gradient(135deg, var(--dourado), var(--dourado-fosco));
            color: #000;
            text-align: center;
            text-decoration: none;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 16px;
            letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        .btn-download:active {
            transform: scale(0.95);
        }

        .info-text {
            margin-top: 20px;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>PHOTO MOVIE</h1>
        <p id="video-number" style="color: var(--dourado); letter-spacing: 2px;"></p>
    </div>

    <div class="video-preview">
        <video id="player" controls playsinline></video>
    </div>

    <a href="#" id="link-download" download class="btn-download">BAIXAR VÍDEO</a>

    <p class="info-text">Se o download não iniciar, clique e segure no vídeo.</p>
    
    <a href="galeria.html" style="color: white; margin-top: 30px; font-size: 14px; opacity: 0.7; text-decoration: none;">← Voltar para galeria</a>

<script>
    const WORKER_URL = 'https://photomovie.maxprimefotovideo.workers.dev';
    
    // Pegar parâmetros da URL
    const params = new URLSearchParams(window.location.search);
    const videoId = params.get('id');
    const numero = params.get('n');

    if (videoId) {
        const videoSrc = `${WORKER_URL}/stream?id=${videoId}`;
        const player = document.getElementById('player');
        const downloadBtn = document.getElementById('link-download');
        
        // Exibir número do vídeo
        if (numero) {
            document.getElementById('video-number').innerText = `VÍDEO #${numero}`;
        }

        // Setar fontes
        player.src = videoSrc;
        downloadBtn.href = videoSrc;
    } else {
        alert("Vídeo não encontrado.");
        window.location.href = 'galeria.html';
    }
</script>
</body>
</html>
