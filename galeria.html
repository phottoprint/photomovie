<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALERIA - Photo Movie</title>
    <style>
        :root { --turquesa: #00d1d1; --dourado: #c5a059; --bg: #001a1a; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; }
        
        .header { padding: 20px; border-bottom: 1px solid var(--dourado); }
        h1 { color: var(--dourado); letter-spacing: 2px; }

        /* Filtro de Eventos */
        .filter-container { margin: 20px 0; }
        select { 
            background: #000; color: var(--dourado); border: 1px solid var(--dourado);
            padding: 10px; border-radius: 8px; width: 80%; max-width: 300px;
        }

        .gallery-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px; padding: 15px;
        }

        .video-card {
            background: #000; border: 1px solid #333; border-radius: 12px;
            overflow: hidden; aspect-ratio: 9/16; position: relative;
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        /* Modal de Visualização */
        #modal-zoom {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
        #modal-zoom video { width: 80%; max-height: 70vh; border: 2px solid var(--dourado); border-radius: 15px; }
        
        .btn-close { margin-top: 20px; padding: 10px 30px; background: var(--dourado); border: none; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>GALERIA VIP</h1>
        <div class="filter-container">
            <select id="select-evento" onchange="carregarVideosPorEvento()">
                <option value="">Todos os Eventos</option>
            </select>
        </div>
    </div>

    <div id="gallery-container" class="gallery-grid">
        </div>

    <div id="modal-zoom">
        <video id="video-full" controls playsinline></video>
        <button class="btn-close" onclick="fecharZoom()">FECHAR</button>
    </div>

<script>
    const WORKER_URL = "photomovie.maxprimefotovideo.workers.dev"; // URL que configuramos no Worker

    window.onload = () => {
        popularFiltro();
        carregarVideosPorEvento();
    };

    // Preenche o Select com os nomes dos eventos que existem no seu sistema
    function popularFiltro() {
        const eventos = JSON.parse(localStorage.getItem('meus_eventos')) || [];
        const select = document.getElementById('select-evento');
        eventos.forEach(ev => {
            let opt = document.createElement('option');
            opt.value = ev.nome;
            opt.innerHTML = ev.nome;
            select.appendChild(opt);
        });
    }

    async function carregarVideosPorEvento() {
        const eventoSelecionado = document.getElementById('select-evento').value;
        const container = document.getElementById('gallery-container');
        container.innerHTML = "<p>Carregando momentos...</p>";

        try {
            // Chama a rota do Worker com o parâmetro de evento se houver
            let url = `${WORKER_URL}/list-videos`;
            if(eventoSelecionado) url += `?evento=${encodeURIComponent(eventoSelecionado)}`;

            const res = await fetch(url);
            const videos = await res.json();

            container.innerHTML = "";
            
            if(videos.length === 0) {
                container.innerHTML = "<p style='color:#666'>Nenhum vídeo encontrado nesta pasta.</p>";
                return;
            }

            videos.forEach(vid => {
                // O id do stream agora é o caminho completo: Pasta/uuid.webm
                const streamUrl = `${WORKER_URL}/stream?id=${encodeURIComponent(vid.url_video)}`;
                
                container.innerHTML += `
                    <div class="video-card" onclick="abrirZoom('${streamUrl}')">
                        <video src="${streamUrl}"></video>
                    </div>
                `;
            });
        } catch (e) {
            container.innerHTML = "<p>Erro ao carregar vídeos.</p>";
        }
    }

    function abrirZoom(url) {
        const modal = document.getElementById('modal-zoom');
        const v = document.getElementById('video-full');
        v.src = url;
        modal.style.display = 'flex';
        v.play();
    }

    function fecharZoom() {
        document.getElementById('modal-zoom').style.display = 'none';
        document.getElementById('video-full').pause();
    }
</script>
</body>
</html>
