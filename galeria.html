<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GALERIA - Photo Movie</title>
    <style>
        :root { --turquesa: #00d1d1; --dourado: #c5a059; --bg: #001a1a; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; min-height: 100vh; }
        
        .header { padding: 20px; border-bottom: 1px solid var(--dourado); background: rgba(0,0,0,0.3); }
        h1 { color: var(--dourado); letter-spacing: 2px; margin-bottom: 15px; text-transform: uppercase; }

        /* Filtro de Eventos */
        .filter-container { margin: 10px 0; }
        select { 
            background: #000; color: var(--dourado); border: 1px solid var(--dourado);
            padding: 12px; border-radius: 8px; width: 85%; max-width: 350px; font-size: 16px;
        }

        .gallery-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px; padding: 15px;
            padding-bottom: 100px;
        }

        .video-card {
            background: #000; border: 1px solid #333; border-radius: 12px;
            overflow: hidden; aspect-ratio: 9/16; position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        video { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        /* Modal de Visualização */
        #modal-zoom {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
        #video-full { width: 85%; max-height: 60vh; border: 2px solid var(--dourado); border-radius: 15px; background: #000; }
        
        .modal-controls { margin-top: 25px; display: flex; gap: 15px; }
        
        .btn-action { padding: 12px 25px; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 14px; }
        .btn-close { background: #444; color: white; }
        .btn-download { background: var(--dourado); color: black; }

        .nav-footer { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 500; }
    </style>
</head>
<body>

    <div class="header">
        <h1>GALERIA VIP</h1>
        <div class="filter-container">
            <select id="select-evento" onchange="carregarVideosPorEvento()">
                <option value="">✨ Todos os Eventos</option>
            </select>
        </div>
    </div>

    <div id="gallery-container" class="gallery-grid">
        </div>

    <div class="nav-footer">
        <a href="index.html" class="btn-action btn-close" style="text-decoration: none; opacity: 0.9;">← VOLTAR AO MENU</a>
    </div>

    <div id="modal-zoom">
        <video id="video-full" controls playsinline crossorigin="anonymous"></video>
        <div class="modal-controls">
            <button class="btn-action btn-close" onclick="fecharZoom()">FECHAR</button>
            <a id="link-download-pg" href="#" class="btn-action btn-download">IR PARA DOWNLOAD</a>
        </div>
    </div>

<script>
    // AJUSTE: Adicionado protocolo https://
    const WORKER_URL = "https://photomovie.maxprimefotovideo.workers.dev"; 

    window.onload = () => {
        popularFiltro();
        carregarVideosPorEvento();
    };

    function popularFiltro() {
        const eventos = JSON.parse(localStorage.getItem('meus_eventos')) || [];
        const select = document.getElementById('select-evento');
        eventos.forEach(ev => {
            let opt = document.createElement('option');
            opt.value = ev.nome;
            opt.innerHTML = "📅 " + ev.nome;
            select.appendChild(opt);
        });
    }

    async function carregarVideosPorEvento() {
        const eventoSelecionado = document.getElementById('select-evento').value;
        const container = document.getElementById('gallery-container');
        container.innerHTML = "<p style='grid-column: 1/-1'>Buscando vídeos na nuvem...</p>";

        try {
            let url = `${WORKER_URL}/list-videos`;
            if(eventoSelecionado) url += `?evento=${encodeURIComponent(eventoSelecionado)}`;

            const res = await fetch(url);
            const videos = await res.json();

            container.innerHTML = "";
            
            if(!videos || videos.length === 0) {
                container.innerHTML = "<p style='grid-column: 1/-1; color:#999; margin-top:50px;'>Nenhum vídeo encontrado nesta categoria.</p>";
                return;
            }

            videos.forEach((vid, index) => {
                // vid.url_video contém o caminho "Evento/uuid.webm"
                const streamUrl = `${WORKER_URL}/stream?id=${encodeURIComponent(vid.url_video)}`;
                
                // Criamos o card. Passamos o ID original para a função de zoom
                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => abrirZoom(streamUrl, vid.url_video, index + 1);
                card.innerHTML = `<video src="${streamUrl}" muted playsinline crossorigin="anonymous"></video>`;
                
                container.appendChild(card);
            });
        } catch (e) {
            container.innerHTML = "<p style='grid-column: 1/-1; color: #ff6b6b;'>Erro de conexão com o servidor.</p>";
        }
    }

    function abrirZoom(streamUrl, videoId, numero) {
        const modal = document.getElementById('modal-zoom');
        const v = document.getElementById('video-full');
        const downloadLink = document.getElementById('link-download-pg');
        
        v.src = streamUrl;
        // AJUSTE: Aponta para a sua página de download enviando o ID e o Número
        downloadLink.href = `download.html?id=${encodeURIComponent(videoId)}&n=${numero}`;
        
        modal.style.display = 'flex';
        v.play();
    }

    function fecharZoom() {
        document.getElementById('modal-zoom').style.display = 'none';
        const v = document.getElementById('video-full');
        v.pause();
        v.src = "";
    }
</script>
</body>
</html>
