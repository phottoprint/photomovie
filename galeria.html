<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GALERIA DE VÍDEOS - 360°</title>
    <style>
        :root { 
            --turquesa-dark: #003333; 
            --dourado: #c5a059;      
            --dourado-fosco: #8e6d2d;
            --cinza-minimal: #666666;
        }
        
        body { 
            margin: 0; 
            background: var(--turquesa-dark); 
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }

        .header { 
            padding: 40px 20px 20px 20px; 
            text-align: center; 
            background: rgba(0,0,0,0.2); 
            border-bottom: 1px solid var(--dourado); 
        }

        .header h1 { 
            margin: 0; 
            font-size: 42px; 
            color: var(--dourado); 
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 900;
        }

        .header p { 
            font-size: 14px; 
            color: var(--dourado); 
            margin: -5px 0 20px 0;
            letter-spacing: 3px;
            text-transform: lowercase;
            opacity: 0.8;
        }

        /* 1 - Busca Arredondada */
        .search-container {
            position: relative;
            max-width: 300px;
            margin: 0 auto;
        }

        .search-container input {
            width: 100%;
            padding: 12px 20px 12px 40px;
            border-radius: 50px;
            border: 1px solid var(--dourado);
            background: rgba(0,0,0,0.3);
            color: white;
            outline: none;
            box-sizing: border-box;
            font-size: 14px;
        }

        .search-container::before {
            content: '🔍';
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            opacity: 0.6;
        }

        /* 7 - Grid e tamanho dos vídeos */
        .gallery-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            padding: 20px; 
        }

        .video-card { 
            background: rgba(0, 0, 0, 0.3); 
            border: 1px solid rgba(197, 160, 89, 0.1); 
            border-radius: 20px; 
            padding: 10px; 
            text-align: center; 
            transition: all 0.3s ease;
        }

        .video-link {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        video.thumb { 
            width: 100%; 
            border-radius: 15px; 
            background: #000; 
            display: block;
            margin-bottom: 8px;
        }

        /* 2 - Número bem mais visível */
        .video-info { 
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5px;
            margin-bottom: 5px; 
        }

        .video-number {
            font-size: 18px; /* Mais Visível */
            font-weight: 900;
            color: var(--dourado);
        }

        .video-id-text {
            font-size: 9px;
            color: var(--cinza-minimal);
            text-transform: uppercase;
        }

        .loading { 
            grid-column: span 2; 
            text-align: center; 
            padding: 80px 0; 
            color: var(--dourado); 
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>PHOTO MOVIE</h1>
        <p>colecionando momentos</p>
        
        <div class="search-container">
            <input type="number" id="videoSearch" placeholder="Buscar pelo NÚMERO..." onkeyup="filtrarGaleria()">
        </div>
    </div>

    <div id="gallery-container" class="gallery-grid">
        <div class="loading">SINCRONIZANDO...</div>
    </div>

<script>
    const WORKER_URL = 'https://photomovie.maxprimefotovideo.workers.dev';
    let videosComNumeracao = [];

    async function carregarGaleria() {
        const container = document.getElementById('gallery-container');
        try {
            const res = await fetch(`${WORKER_URL}/list-videos`);
            const videos = await res.json();
            
            if (videos.length === 0) {
                container.innerHTML = "<div class='loading'>SEM VÍDEOS</div>";
                return;
            }

            // 3 - Ordem Reversa e 2 - Criar numeração fixa
            const total = videos.length;
            videosComNumeracao = videos.reverse().map((vid, index) => ({
                ...vid,
                numero: total - index
            }));

            renderizarVideos(videosComNumeracao);

        } catch (e) {
            container.innerHTML = "<div class='loading' style='color:red'>ERRO AO CARREGAR</div>";
        }
    }

    function renderizarVideos(lista) {
        const container = document.getElementById('gallery-container');
        container.innerHTML = "";
        
        lista.forEach(vid => {
            const card = document.createElement('div');
            card.className = 'video-card';
            
            const downloadUrl = `https://maxsynk.github.io/photomovie/download.html?id=${vid.uuid}&n=${vid.numero}`;
            
            card.innerHTML = `
                <a href="${downloadUrl}" class="video-link">
                    <div class="video-info">
                        <span class="video-number">#${vid.numero}</span>
                        <span class="video-id-text">ID: ${vid.uuid.substring(0,6)}</span>
                    </div>
                    <video class="thumb" src="${WORKER_URL}/stream?id=${vid.uuid}#t=0.5" preload="metadata"></video>
                    </a>
            `;
            container.appendChild(card);
        });
    }

    // 1 - Busca apenas pelo número
    function filtrarGaleria() {
        const termo = document.getElementById('videoSearch').value;
        if (!termo) {
            renderizarVideos(videosComNumeracao);
            return;
        }
        const filtrados = videosComNumeracao.filter(v => v.numero.toString() === termo);
        renderizarVideos(filtrados);
    }

    carregarGaleria();
    setInterval(carregarGaleria, 30000);
</script>
</body>
</html>
