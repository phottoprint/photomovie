<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GALERIA DE VÍDEOS - 360°</title>
    <style>
        :root { 
            --turquesa-dark: #003333; 
            --dourado: #c5a059;      
            --dourado-fosco: #8e6d2d;
            --cinza-minimal: #666666;
        }
        
        body { 
            margin: 0; 
            background: var(--turquesa-dark); 
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }

        .header { 
            padding: 40px 20px; 
            text-align: center; 
            background: rgba(0,0,0,0.2); 
            border-bottom: 1px solid var(--dourado); 
        }

        .header h2 { 
            margin: 0; 
            font-size: 24px; 
            color: var(--dourado); 
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 900;
        }

        .header p { 
            font-size: 13px; 
            color: #ccc; 
            margin-top: 5px;
            letter-spacing: 1px;
        }

        .gallery-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            padding: 20px; 
        }

        .video-card { 
            background: rgba(0, 0, 0, 0.3); 
            border: 1px solid rgba(197, 160, 89, 0.3); 
            border-radius: 20px; 
            padding: 10px; 
            text-align: center; 
            transition: transform 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        video.thumb { 
            width: 100%; 
            border-radius: 15px; 
            margin-bottom: 10px; 
            background: #000; 
        }

        .btn-abrir { 
            background: linear-gradient(135deg, var(--dourado), var(--dourado-fosco)); 
            color: #000; 
            border: none; 
            padding: 12px; 
            border-radius: 50px; 
            width: 100%; 
            font-weight: 800; 
            font-size: 11px;
            cursor: pointer; 
            text-decoration: none; 
            display: block; 
            box-sizing: border-box; 
            text-transform: uppercase;
        }

        .video-id { 
            font-size: 9px; 
            color: var(--cinza-minimal); 
            margin-bottom: 8px; 
            text-transform: uppercase;
        }

        .loading { 
            grid-column: span 2; 
            text-align: center; 
            padding: 100px 0; 
            color: var(--dourado); 
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>PHOTO MOVIE</h2>
        <p>Encontre seu vídeo 360°</p>
    </div>

    <div id="gallery-container" class="gallery-grid">
        <div class="loading">SINCRONIZANDO VÍDEOS...</div>
    </div>

<script>
    const WORKER_URL = 'https://photomovie.maxprimefotovideo.workers.dev';

    async function carregarGaleria() {
        const container = document.getElementById('gallery-container');
        try {
            const res = await fetch(`${WORKER_URL}/list-videos`);
            const videos = await res.json();
            
            if (videos.length === 0) {
                container.innerHTML = "<div class='loading'>NENHUM VÍDEO ENCONTRADO</div>";
                return;
            }

            container.innerHTML = "";
            
            videos.forEach(vid => {
                const card = document.createElement('div');
                card.className = 'video-card';
                
                // ATUALIZADO: Usando o novo caminho maxsynk
                const downloadUrl = `https://maxsynk.github.io/photomovie/download.html?id=${vid.uuid}&fx=${vid.preset_usado || 'boom'}`;
                
                card.innerHTML = `
                    <video class="thumb" 
                           src="${WORKER_URL}/stream?id=${vid.uuid}" 
                           preload="metadata" 
                           muted playsinline autoplay loop>
                    </video>
                    <div class="video-id">VÍDEO #${vid.uuid.substring(0,6)}</div>
                    <a href="${downloadUrl}" class="btn-abrir">BAIXAR / QR CODE</a>
                `;
                container.appendChild(card);
            });
        } catch (e) {
            container.innerHTML = "<div class='loading' style='color:red'>ERRO DE CONEXÃO</div>";
        }
    }

    carregarGaleria();
    setInterval(carregarGaleria, 20000);
</script>
</body>
</html>
