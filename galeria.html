<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GALERIA VIP - Photo Movie</title>
    <style>
        :root { --turquesa: #00d1d1; --dourado: #c5a059; --bg: #001a1a; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; min-height: 100vh; }
        
        .header { padding: 20px; border-bottom: 1px solid var(--dourado); background: rgba(0,0,0,0.3); }
        h1 { color: var(--dourado); letter-spacing: 2px; margin-bottom: 15px; text-transform: uppercase; }

        .filter-container { margin: 10px 0; }
        select { 
            background: #000; color: var(--dourado); border: 1px solid var(--dourado);
            padding: 12px; border-radius: 8px; width: 85%; max-width: 350px; font-size: 16px;
        }

        .gallery-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px; padding: 15px;
            padding-bottom: 100px;
        }

        .video-card {
            background: #000; border: 1px solid #333; border-radius: 12px;
            overflow: hidden; aspect-ratio: 9/16; position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            cursor: pointer;
        }

        .video-card img, .video-card video { width: 100%; height: 100%; object-fit: cover; }

        #modal-zoom {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
        #media-full { width: 85%; max-height: 60vh; border: 2px solid var(--dourado); border-radius: 15px; background: #000; }
        
        .modal-controls { margin-top: 25px; display: flex; gap: 15px; }
        .btn-action { padding: 12px 25px; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 14px; }
        .btn-close { background: #444; color: white; }
        .btn-download { background: var(--dourado); color: black; }

        .nav-footer { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 500; }
    </style>
</head>
<body>

    <div class="header">
        <h1>GALERIA VIP</h1>
        <div class="filter-container">
            <select id="select-evento" onchange="carregarArquivos()">
                <option value="">✨ Selecione o Evento</option>
            </select>
        </div>
    </div>

    <div id="gallery-container" class="gallery-grid"></div>

    <div class="nav-footer">
        <a href="index.html" class="btn-action btn-close">← VOLTAR AO MENU</a>
    </div>

    <div id="modal-zoom">
        <video id="media-full" controls playsinline crossorigin="anonymous" style="display:none"></video>
        <img id="img-full" style="display:none; width: 85%; max-height: 60vh; border: 2px solid var(--dourado); border-radius: 15px;">
        
        <div class="modal-controls">
            <button class="btn-action btn-close" onclick="fecharZoom()">FECHAR</button>
            <button id="btn-download-force" class="btn-action btn-download">BAIXAR AGORA</button>
        </div>
    </div>

<script>
    const WORKER_URL = "https://photomovie.maxprimefotovideo.workers.dev"; 

    window.onload = async () => {
        await popularFiltro();
        carregarArquivos();
    };

    async function popularFiltro() {
        try {
            const res = await fetch(`${WORKER_URL}/listar-eventos`);
            const eventos = await res.json();
            const select = document.getElementById('select-evento');
            eventos.forEach(ev => {
                let opt = document.createElement('option');
                opt.value = ev.nome;
                opt.innerHTML = "📅 " + ev.nome;
                select.appendChild(opt);
            });
        } catch (e) { console.error("Erro ao carregar filtros"); }
    }

    async function carregarArquivos() {
        const eventoSelecionado = document.getElementById('select-evento').value;
        const container = document.getElementById('gallery-container');
        if(!eventoSelecionado) {
            container.innerHTML = "<p style='grid-column: 1/-1; color:#666;'>Selecione um evento.</p>";
            return;
        }

        container.innerHTML = "<p style='grid-column: 1/-1'>Sincronizando Galeria...</p>";

        try {
            const res = await fetch(`${WORKER_URL}/listar-galeria?evento=${encodeURIComponent(eventoSelecionado)}`);
            const arquivos = await res.json();
            container.innerHTML = "";
            
            if(!arquivos || arquivos.length === 0) {
                container.innerHTML = "<p style='grid-column: 1/-1; color:#999; margin-top:50px;'>Nenhum arquivo encontrado.</p>";
                return;
            }

            arquivos.forEach((file) => {
                const streamUrl = `${WORKER_URL}/stream?id=${encodeURIComponent(file.path)}`;
                const card = document.createElement('div');
                card.className = 'video-card';
                
                const isVideo = file.path.toLowerCase().endsWith('.mp4') || file.path.toLowerCase().endsWith('.webm');
                
                if(isVideo) {
                    // Adicionado #t=0.1 para carregar o primeiro frame do vídeo
                    card.innerHTML = `<video src="${streamUrl}#t=0.1" muted playsinline preload="metadata"></video>`;
                } else if(file.path.toLowerCase().endsWith('.mp3')) {
                    card.innerHTML = `<div style="display:flex; height:100%; align-items:center; justify-content:center; background:#111; color:var(--dourado)">🎵 MP3</div>`;
                } else {
                    card.innerHTML = `<img src="${streamUrl}" loading="lazy">`;
                }

                card.onclick = () => abrirZoom(streamUrl, file.path);
                container.appendChild(card);
            });
        } catch (e) {
            container.innerHTML = "<p style='grid-column: 1/-1; color: #ff6b6b;'>Erro de conexão.</p>";
        }
    }

    function abrirZoom(url, path) {
        const modal = document.getElementById('modal-zoom');
        const video = document.getElementById('media-full');
        const img = document.getElementById('img-full');
        const btnDownload = document.getElementById('btn-download-force');
        
        modal.style.display = 'flex';
        
        // Função de download forçado
        btnDownload.onclick = () => forcarDownload(url, path.split('/').pop());

        if(path.toLowerCase().endsWith('.mp4') || path.toLowerCase().endsWith('.webm')) {
            video.src = url;
            video.style.display = 'block';
            img.style.display = 'none';
            video.play();
        } else {
            img.src = url;
            img.style.display = 'block';
            video.style.display = 'none';
        }
    }

    // Função que garante o download do arquivo
    async function forcarDownload(url, filename) {
        const btn = document.getElementById('btn-download-force');
        const originalText = btn.innerText;
        btn.innerText = "BAIXANDO...";
        
        try {
            const response = await fetch(url);
            const blob = await response.blob();
            const blobUrl = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = blobUrl;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(blobUrl);
            a.remove();
        } catch (e) {
            alert("Erro ao baixar. Tente segurar na imagem e 'Salvar Como'.");
        } finally {
            btn.innerText = originalText;
        }
    }

    function fecharZoom() {
        document.getElementById('modal-zoom').style.display = 'none';
        const v = document.getElementById('media-full');
        v.pause();
        v.src = "";
    }
</script>
</body>
</html>
