<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GALERIA DE VÍDEOS - 360°</title>
    <style>
        :root { --neon: #9200ff; --cyan: #00f2ff; }
        body { margin: 0; background: #000; color: white; font-family: sans-serif; }
        .header { padding: 30px; text-align: center; background: #111; border-bottom: 2px solid var(--neon); }
        .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; }
        .video-card { background: #111; border: 1px solid #333; border-radius: 15px; padding: 10px; text-align: center; }
        video.thumb { width: 100%; border-radius: 10px; margin-bottom: 8px; background: #000; }
        .btn-abrir { background: var(--neon); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; text-decoration: none; display: block; box-sizing: border-box; }
        .loading { text-align: center; padding: 50px; color: var(--cyan); }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0; font-size: 18px;">ENCONTRE SEU VÍDEO</h2>
        <p style="font-size: 12px; color: #888;">Toque no vídeo para baixar via QR Code</p>
    </div>

    <div id="gallery-container" class="gallery-grid">
        <div class="loading">Buscando vídeos...</div>
    </div>

<script>
    const WORKER_URL = 'https://photomovie.maxprimefotovideo.workers.dev';

    async function carregarGaleria() {
        const container = document.getElementById('gallery-container');
        try {
            const res = await fetch(`${WORKER_URL}/list-videos`);
            const videos = await res.json();
            container.innerHTML = "";
            
            videos.forEach(vid => {
                const card = document.createElement('div');
                card.className = 'video-card';
                
                // Link para a página de download com os parâmetros do vídeo
                const downloadUrl = `./download.html?id=${vid.uuid}&fx=${vid.preset_usado || 'boom'}`;
                
                card.innerHTML = `
                    <video class="thumb" src="${WORKER_URL}/stream?id=${vid.uuid}#t=0.1" preload="metadata"></video>
                    <div style="font-size:10px; color:#666; margin-bottom:5px;">ID: ${vid.uuid}</div>
                    <a href="${downloadUrl}" class="btn-abrir">BAIXAR / QR</a>
                `;
                container.appendChild(card);
            });
        } catch (e) {
            container.innerHTML = "<p>Erro ao carregar vídeos.</p>";
        }
    }

    carregarGaleria();
    // Atualiza a galeria a cada 30 segundos sozinho
    setInterval(carregarGaleria, 30000);
</script>
</body>
</html>
