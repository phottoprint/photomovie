<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHOTO MOVIE - ADMIN</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root { --turquesa: #00d1d1; --dourado: #c5a059; --bg: #001a1a; --danger: #ff4d4d; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; min-height: 100vh; }
        
        .header { 
            padding: 20px; 
            border-bottom: 2px solid var(--dourado); 
            background: rgba(0,0,0,0.6); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 90%;
            position: relative;
            margin-bottom: 5px;
        }

        .event-left { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            position: absolute; 
            left: 0;
        }
        .v-line { width: 2px; height: 35px; background: var(--dourado); border-radius: 2px; }
        #nome-evento-titulo { 
            color: var(--dourado); 
            font-size: 14px; 
            margin: 0; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            font-weight: bold;
            text-align: left;
        }

        .title-group h1 { color: var(--dourado); letter-spacing: 5px; margin: 0; text-transform: uppercase; font-size: 1.5rem; font-weight: 900; }

        .search-container { padding: 15px; background: rgba(0,0,0,0.3); display: flex; justify-content: center; gap: 8px; width: 100%; box-sizing: border-box; }
        .search-container input { 
            width: 120px; padding: 12px; border-radius: 8px; 
            border: 1px solid var(--dourado); background: #000; color: var(--dourado); 
            text-align: center; font-weight: bold; outline: none; font-size: 16px;
        }
        .btn-busca { background: var(--dourado); color: black; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .admin-tools { display: flex; gap: 10px; justify-content: center; padding: 15px; flex-wrap: wrap; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; padding: 15px; padding-bottom: 120px; }

        .video-card { 
            background: #000; border: 1px solid rgba(197, 160, 89, 0.3); border-radius: 12px; 
            overflow: hidden; aspect-ratio: 9/16; position: relative; cursor: pointer;
        }
        .video-card video { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        .video-id-badge {
            position: absolute; top: 8px; left: 8px; background: var(--dourado);
            color: black; padding: 2px 8px; border-radius: 4px; font-weight: 900; font-size: 12px; z-index: 10;
        }

        .btn-del-mini { position: absolute; top: 8px; right: 8px; background: var(--danger); border: none; color: white; border-radius: 50%; width: 30px; height: 30px; font-weight: bold; cursor: pointer; z-index: 20; }

        #modal-zoom { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        #media-full { width: 85%; max-height: 70vh; border: 2px solid var(--dourado); border-radius: 15px; background: #000; }

        .modal-controls { margin-top: 25px; display: flex; gap: 10px; width: 85%; justify-content: center; flex-wrap: wrap; }
        .btn-action { padding: 12px 20px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 12px; text-transform: uppercase; }
        .btn-close { background: #333; color: white; }
        .btn-download { background: var(--dourado); color: black; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-zip { background: #28a745; color: white; }

        .nav-footer { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 500; width: 90%; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-top">
            <div class="event-left">
                <div class="v-line"></div>
                <p id="nome-evento-titulo">Sincronizando...</p>
            </div>
            <div class="title-group">
                <h1>ADMIN</h1>
            </div>
        </div>
        <div class="search-container">
            <input type="number" id="input-busca" placeholder="Nº">
            <button class="btn-busca" onclick="executarBusca()">🔍 PESQUISAR</button>
        </div>
    </div>

    <div class="admin-tools">
        <button class="btn-action btn-zip" onclick="baixarTudoZip()">📦 BAIXAR TODOS (ZIP)</button>
        <button class="btn-action btn-danger" onclick="excluirTudo()">⚠️ APAGAR GALERIA</button>
    </div>

    <div id="gallery-container" class="gallery-grid"></div>

    <div class="nav-footer">
        <a href="index.html" class="btn-action btn-close" style="display: block; text-align: center; background: rgba(197, 160, 89, 0.1); color: var(--dourado); border: 1px solid var(--dourado);">← VOLTAR</a>
    </div>

    <div id="modal-zoom">
        <video id="media-full" controls playsinline crossorigin="anonymous"></video>
        <div class="modal-controls">
            <button class="btn-action btn-close" onclick="fecharZoom()">FECHAR</button>
            <button id="btn-download-force" class="btn-action btn-download">BAIXAR MP4</button>
            <button id="btn-delete-modal" class="btn-action btn-danger">EXCLUIR VÍDEO</button>
        </div>
    </div>

<script>
    const WORKER_URL = "https://photomovie.maxprimefotovideo.workers.dev";
    let listaFinais = [];
    let idPastaFixo = ""; 

    window.onload = () => {
        const config = JSON.parse(localStorage.getItem('config_atual'));
        if(!config) { window.location.href = "index.html"; return; }

        // SINCRONIZAÇÃO COM GALERIA.HTML (Usa o nome para exibição e id_fixo para os arquivos)
        document.getElementById('nome-evento-titulo').innerText = (config.nome || "").replace(/_/g, ' ');
        
        // Se não houver id_fixo (eventos antigos), usa o nome como fallback
        idPastaFixo = config.id_fixo || config.nome; 
        
        carregarArquivos();
        // Sincroniza a cada 3 segundos igual na galeria
        setInterval(carregarArquivos, 3000);
    };

    async function carregarArquivos() {
        try {
            const res = await fetch(`${WORKER_URL}/listar-galeria?evento=${encodeURIComponent(idPastaFixo)}`);
            const dados = await res.json();
            const novosFinais = dados.filter(f => f.path.includes('final_'));
            
            // Só renderiza se houver mudança na quantidade ou nos nomes dos arquivos
            if (JSON.stringify(novosFinais) !== JSON.stringify(listaFinais)) {
                listaFinais = novosFinais;
                renderizarGaleria();
            }
        } catch (e) { console.error("Erro ao carregar arquivos."); }
    }

    function renderizarGaleria() {
        const container = document.getElementById('gallery-container');
        container.innerHTML = "";
        
        if (listaFinais.length === 0) {
            container.innerHTML = "<p style='grid-column: 1/-1; opacity:0.5; margin-top:50px;'>Nenhum vídeo finalizado encontrado.</p>";
            return;
        }

        listaFinais.forEach((file, index) => {
            const url = `${WORKER_URL}/stream?id=${encodeURIComponent(file.path)}`;
            const card = document.createElement('div');
            card.className = 'video-card';
            card.innerHTML = `
                <div class="video-id-badge">#${index + 1}</div>
                <button class="btn-del-mini" onclick="event.stopPropagation(); excluirArquivo('${file.path}')">X</button>
                <video src="${url}#t=0.5" muted playsinline></video>
            `;
            card.onclick = () => abrirZoom(url, file.path);
            container.appendChild(card);
        });
    }

    function executarBusca() {
        const num = document.getElementById('input-busca').value;
        if (!num) return;
        const index = parseInt(num) - 1;
        if (listaFinais[index]) {
            const file = listaFinais[index];
            const url = `${WORKER_URL}/stream?id=${encodeURIComponent(file.path)}`;
            abrirZoom(url, file.path);
            document.getElementById('input-busca').value = '';
        } else {
            alert("Vídeo #" + num + " não encontrado!");
        }
    }

    function abrirZoom(url, path) {
        const modal = document.getElementById('modal-zoom');
        const video = document.getElementById('media-full');
        modal.style.display = 'flex';
        video.src = url;
        video.play();
        document.getElementById('btn-download-force').onclick = () => forcarDownload(url, path.split('/').pop());
        document.getElementById('btn-delete-modal').onclick = () => { excluirArquivo(path); fecharZoom(); };
    }

    async function excluirArquivo(path) {
        if(!confirm("Excluir vídeo permanentemente?")) return;
        try {
            await fetch(`${WORKER_URL}/deletar`, { 
                method: 'POST', 
                body: JSON.stringify({ id: path, evento: idPastaFixo }) 
            });
            carregarArquivos();
        } catch (e) { alert("Erro ao deletar."); }
    }

    async function excluirTudo() {
        if(prompt("Digite 'apagar' para limpar TUDO deste evento:") !== 'apagar') return;
        for(let f of listaFinais) {
            await fetch(`${WORKER_URL}/deletar`, { 
                method: 'POST', 
                body: JSON.stringify({ id: f.path, evento: idPastaFixo }) 
            });
        }
        carregarArquivos();
    }

    async function baixarTudoZip() {
        const btn = document.querySelector('.btn-zip');
        const originalText = btn.innerText;
        btn.innerText = "⏳ PROCESSANDO...";
        try {
            const zip = new JSZip();
            for(let i = 0; i < listaFinais.length; i++) {
                const res = await fetch(`${WORKER_URL}/stream?id=${encodeURIComponent(listaFinais[i].path)}`);
                const blob = await res.blob();
                zip.file(`video_${i+1}.mp4`, blob);
            }
            const content = await zip.generateAsync({type:"blob"});
            saveAs(content, `Galeria_${idPastaFixo}.zip`);
        } catch (e) { alert("Erro ao gerar ZIP."); }
        btn.innerText = originalText;
    }

    async function forcarDownload(url, filename) {
        try {
            const res = await fetch(url);
            const blob = await res.blob();
            saveAs(blob, filename);
        } catch (e) { alert("Erro no download."); }
    }

    function fecharZoom() {
        document.getElementById('modal-zoom').style.display = 'none';
        document.getElementById('media-full').pause();
        document.getElementById('media-full').src = "";
    }
</script>
</body>
</html>
