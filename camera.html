<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHOTO MOVIE Pro - Camera</title>
    <style>
        :root { 
            --turquesa-dark: #008b8b; 
            --dourado: #c5a059; 
            --laranja: #ff8c00;
        }
        
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }

        .screen { display: none; min-height: 100vh; width: 100vw; flex-direction: column; align-items: center; position: absolute; }
        .active { display: flex; }

        #cam-container { width: 100%; height: 100vh; position: relative; background: #000; overflow: hidden; }
        #vid-preview { width: 100%; height: 100%; object-fit: cover; }
        
        .event-badge { 
            position: fixed; 
            top: 30px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: rgba(0,0,0,0.6); 
            padding: 10px 25px; 
            border-radius: 30px; 
            border: 1px solid var(--dourado); 
            font-size: 14px; 
            z-index: 1000; 
            color: var(--dourado); 
            font-weight: bold;
            text-transform: uppercase;
            backdrop-filter: blur(5px);
            white-space: nowrap;
        }

        .controls { 
            position: absolute; 
            bottom: 80px; 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            z-index: 100; 
        }

        /* Obturador Turquesa Escuro */
        .shutter { 
            width: 90px; 
            height: 90px; 
            background: var(--turquesa-dark); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer;
            border: 4px solid white;
            animation: pulse-gold 2s infinite;
        }

        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(197, 160, 89, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(197, 160, 89, 0); }
            100% { box-shadow: 0 0 0 0 rgba(197, 160, 89, 0); }
        }

        /* Botão Girar Afastado à Direita */
        .btn-ui-flip { 
            position: absolute;
            right: 30px;
            background: rgba(0,0,0,0.5); 
            border: 1px solid rgba(255,255,255,0.3); 
            color: white; 
            width: 55px; 
            height: 55px; 
            border-radius: 50%; 
            font-size: 1.5rem; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            backdrop-filter: blur(5px);
        }

        /* Mensagens de Status */
        #status-msg { 
            position: fixed; 
            inset: 0; 
            z-index: 1500; 
            display: none; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            font-size: 6rem; 
            font-weight: 900; 
            background: rgba(0,0,0,0.2); 
            text-shadow: 0 0 30px #000; 
            pointer-events: none; 
        }

        .piscando { animation: blink 0.6s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }

        .pulsando { animation: pulse-final 0.5s infinite alternate; }
        @keyframes pulse-final { from { transform: scale(1); } to { transform: scale(1.1); } }

        #upload-loading { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; display: none; flex-direction: column; align-items: center; justify-content: center; color: var(--turquesa-dark); }
    </style>
</head>
<body>

    <div id="evento-info-badge" class="event-badge" style="display:none;"></div>

    <div id="upload-loading">
        <div style="font-size: 24px; margin-bottom: 10px; font-weight: bold;">ENVIANDO...</div>
        <small style="color: white;">Salvando na pasta do evento</small>
    </div>

    <div id="screen-camera" class="screen active">
        <div id="cam-container">
            <video id="vid-preview" autoplay playsinline muted></video>
            <img id="moldura-r2" src="" style="display:none;" crossorigin="anonymous">
            <canvas id="record-canvas" width="720" height="1280" style="display:none;"></canvas>
            
            <div id="status-msg"></div>
            
            <div class="controls">
                <div class="shutter" onclick="iniciarContagem()">
                    <div style="width: 25px; height: 25px; background: white; border-radius: 4px;"></div>
                </div>
                <button class="btn-ui-flip" onclick="girarCamera()">🔄</button>
            </div>
        </div>
    </div>

<script>
    let stream, recorder, chunks = [], currentFacingMode = "environment";
    const video = document.getElementById('vid-preview');
    const canvas = document.getElementById('record-canvas');
    const ctx = canvas.getContext('2d');
    const frameImg = document.getElementById('moldura-r2');
    const msg = document.getElementById('status-msg');
    
    const WORKER_URL = "https://photomovie.maxprimefotovideo.workers.dev"; 

    window.onload = () => {
        const configSessao = JSON.parse(localStorage.getItem('config_atual'));
        if(configSessao) {
            document.getElementById('evento-info-badge').innerText = configSessao.nome;
            document.getElementById('evento-info-badge').style.display = 'block';
            if(configSessao.moldura) frameImg.src = configSessao.moldura;
        }
        ligarCamera();
    };

    async function ligarCamera() {
        if (stream) stream.getTracks().forEach(t => t.stop());
        try {
            stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: currentFacingMode, width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 30 } },
                audio: false
            });
            video.srcObject = stream;
        } catch (err) { alert("Erro ao acessar câmera."); }
    }

    function girarCamera() {
        currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
        ligarCamera();
    }

    function iniciarContagem() {
        let c = 3;
        msg.className = ""; 
        msg.style.display = 'flex';
        msg.style.color = "white";
        msg.innerText = c;

        let t = setInterval(() => {
            c--;
            if(c > 0) {
                msg.innerText = c;
            } else { 
                clearInterval(t); 
                msg.style.display = 'none';
                gravar(); 
            }
        }, 1000);
    }

    function gravar() {
        chunks = [];
        const configSessao = JSON.parse(localStorage.getItem('config_atual'));
        const tempoTotal = configSessao ? parseInt(configSessao.tempo) : 10;
        const nomeEvento = configSessao ? configSessao.nome : "Geral";
        
        const drawLoop = () => {
            ctx.drawImage(video, 0, 0, 720, 1280);
            if(frameImg.complete && frameImg.src !== "") ctx.drawImage(frameImg, 0, 0, 720, 1280);
            if(recorder && recorder.state === "recording") requestAnimationFrame(drawLoop);
        };

        const recStream = canvas.captureStream(30);
        recorder = new MediaRecorder(recStream, { mimeType: 'video/webm;codecs=vp8', videoBitsPerSecond: 3500000 });
        
        recorder.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };
        
        recorder.onstop = async () => {
            msg.innerText = "FINALIZADO";
            msg.style.color = "var(--turquesa-dark)";
            msg.classList.add("pulsando");
            
            const blob = new Blob(chunks, { type: 'video/webm' });
            setTimeout(async () => {
                await realizarUpload(blob, nomeEvento);
            }, 1200);
        };

        recorder.start();
        drawLoop();

        // Lógica de avisos de tempo
        let segundosDecorridos = 0;
        let timerGravacao = setInterval(() => {
            segundosDecorridos++;
            
            // Faltando 3 segundos
            if (segundosDecorridos === (tempoTotal - 3)) {
                msg.style.display = 'flex';
                msg.innerText = "FINALIZANDO";
                msg.style.color = "var(--laranja)";
                msg.style.fontSize = "3rem";
                msg.classList.add("piscando");
            }

            if (segundosDecorridos >= tempoTotal) {
                clearInterval(timerGravacao);
                if(recorder.state === "recording") recorder.stop();
            }
        }, 1000);
    }

    async function realizarUpload(blob, evento) {
        msg.style.display = 'none';
        msg.classList.remove("pulsando", "piscando");
        document.getElementById('upload-loading').style.display = 'flex';
        
        const uuid = "vid_" + Date.now();
        const formData = new FormData();
        formData.append("video", blob);
        formData.append("uuid", uuid);
        formData.append("evento", evento);

        try {
            const res = await fetch(`${WORKER_URL}/upload`, { method: 'POST', body: formData });
            if(res.ok) window.location.href = 'galeria.html';
            else {
                alert("Falha no upload");
                document.getElementById('upload-loading').style.display = 'none';
            }
        } catch (e) { 
            document.getElementById('upload-loading').style.display = 'none';
        }
    }
</script>
</body>
</html>
