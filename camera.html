<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Câmera Pro - Photo Movie</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #cam-container { width: 100vw; height: 100vh; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #moldura-view { 
            position: absolute; inset: 0; width: 100%; height: 100%; 
            pointer-events: none; object-fit: fill; z-index: 10; 
            display: none; 
        }
        .controls { position: absolute; bottom: 50px; width: 100%; text-align: center; z-index: 100; }
        .shutter { width: 80px; height: 80px; border-radius: 50%; background: #00d1d1; border: 5px solid white; display: inline-block; cursor: pointer; }
        #status { position: fixed; inset: 0; display: none; background: rgba(0,0,0,0.5); color: #fff; font-size: 80px; align-items: center; justify-content: center; z-index: 200; }
        #loading { position: fixed; inset: 0; display: none; background: #000; color: #00d1d1; align-items: center; justify-content: center; z-index: 300; flex-direction: column; gap: 10px; }
        .spinner { width: 40px; height: 40px; border: 4px solid #fff; border-top: 4px solid #00d1d1; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="cam-container">
        <video id="preview" autoplay playsinline muted></video>
        <img id="moldura-view" alt="moldura">
        <div class="controls">
            <div class="shutter" id="btn-shoot"></div>
        </div>
    </div>

    <canvas id="canvas" width="720" height="1280" style="display:none;"></canvas>
    <div id="status"></div>
    <div id="loading">
        <div class="spinner"></div>
        <span>PROCESSANDO E ENVIANDO...</span>
    </div>

<script>
    const WORKER_URL = "https://photomovie.maxprimefotovideo.workers.dev";
    const video = document.getElementById('preview');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const btn = document.getElementById('btn-shoot');
    const view = document.getElementById('moldura-view');
    
    const molduraImg = new Image();
    molduraImg.crossOrigin = "anonymous"; 

    window.onload = async () => {
        const config = JSON.parse(localStorage.getItem('config_atual'));
        
        if (config) {
            // AJUSTE 1: Limpeza do ID da moldura para não vir link quebrado
            let molduraPath = config.molduraUrl || config.moldura;
            if (molduraPath) {
                // Se o path vier com a URL do worker, extraímos apenas o que está depois do ID=
                const cleanId = molduraPath.includes('id=') ? molduraPath.split('id=')[1] : molduraPath;
                const urlFinal = `${WORKER_URL}/stream?id=${cleanId}`;
                
                molduraImg.src = urlFinal;
                view.src = urlFinal;

                molduraImg.onload = () => {
                    view.style.display = 'block';
                    console.log("Moldura carregada com sucesso.");
                };
            }
        }
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }, 
                audio: false 
            });
            video.srcObject = stream;
        } catch (e) {
            alert("Erro ao abrir câmera.");
        }
    };

    btn.onclick = () => {
        let c = 3;
        const status = document.getElementById('status');
        status.style.display = 'flex';
        status.innerText = c;
        
        let t = setInterval(() => {
            c--;
            if(c > 0) status.innerText = c;
            else { 
                clearInterval(t); 
                status.style.display = 'none'; 
                iniciarGravacao(); 
            }
        }, 1000);
    };

    function iniciarGravacao() {
        const chunks = [];
        const config = JSON.parse(localStorage.getItem('config_atual'));
        const tempo = (config ? parseInt(config.tempo) : 10) * 1000;
        // AJUSTE 2: Garantir que o nome do evento seja EXATAMENTE o que está no banco
        const nomeEvento = config ? config.nome : "Geral";

        let recorder;

        const loop = () => {
            if (video.paused || video.ended) return;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            if (molduraImg.complete) {
                ctx.drawImage(molduraImg, 0, 0, canvas.width, canvas.height);
            }
            if (recorder && recorder.state === "recording") {
                requestAnimationFrame(loop);
            }
        };

        const stream = canvas.captureStream(30);
        recorder = new MediaRecorder(stream, { 
            mimeType: 'video/webm;codecs=vp8',
            videoBitsPerSecond: 3000000 
        });
        
        recorder.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };
        
        recorder.onstop = async () => {
            document.getElementById('loading').style.display = 'flex';
            const blob = new Blob(chunks, { type: 'video/webm' });
            
            const fd = new FormData();
            fd.append("video", blob);
            fd.append("uuid", "vid_" + Date.now() + ".webm");
            fd.append("evento", nomeEvento); 

            try {
                const res = await fetch(`${WORKER_URL}/upload`, { 
                    method: "POST", 
                    body: fd 
                });
                
                if(res.ok) {
                    // AJUSTE 3: Delay de segurança para o Banco D1 processar o registro
                    setTimeout(() => {
                        window.location.href = "galeria.html";
                    }, 800);
                } else {
                    alert("Erro ao salvar vídeo.");
                    document.getElementById('loading').style.display = 'none';
                }
            } catch (err) {
                alert("Erro de conexão.");
                document.getElementById('loading').style.display = 'none';
            }
        };

        recorder.start();
        loop(); 
        
        setTimeout(() => { 
            if(recorder.state === "recording") recorder.stop(); 
        }, tempo);
    }
</script>
</body>
</html>
