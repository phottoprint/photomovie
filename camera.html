<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Câmera Pro - Fix</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #cam-container { width: 100vw; height: 100vh; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { display: none; }
        .controls { position: absolute; bottom: 50px; width: 100%; text-align: center; z-index: 100; }
        .shutter { 
            width: 80px; height: 80px; border-radius: 50%; background: #00d1d1; 
            border: 5px solid white; display: inline-block; cursor: pointer;
        }
        #moldura-view { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; object-fit: fill; z-index: 10; }
        #status { position: fixed; inset: 0; display: none; background: rgba(0,0,0,0.5); color: #fff; font-size: 80px; align-items: center; justify-content: center; z-index: 200; }
        #loading { position: fixed; inset: 0; display: none; background: #000; color: #00d1d1; align-items: center; justify-content: center; z-index: 300; }
    </style>
</head>
<body>

    <div id="cam-container">
        <video id="preview" autoplay playsinline muted></video>
        <img id="moldura-view" src="">
        <div class="controls">
            <div class="shutter" id="btn-shoot"></div>
        </div>
    </div>

    <canvas id="canvas" width="720" height="1280"></canvas>
    <div id="status"></div>
    <div id="loading">ENVIANDO...</div>

<script>
    const video = document.getElementById('preview');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const btn = document.getElementById('btn-shoot');
    const molduraImg = new Image();
    molduraImg.crossOrigin = "anonymous"; // CRÍTICO PARA A JUNÇÃO FUNCIONAR

    let recorder, chunks = [];

    window.onload = async () => {
        const config = JSON.parse(localStorage.getItem('config_atual'));
        if (config && config.moldura) {
            molduraImg.src = config.moldura;
            document.getElementById('moldura-view').src = config.moldura;
        }
        
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment", width: 1280, height: 720 }, 
            audio: false 
        });
        video.srcObject = stream;
    };

    btn.onclick = () => {
        let c = 3;
        const status = document.getElementById('status');
        status.style.display = 'flex';
        status.innerText = c;
        
        let t = setInterval(() => {
            c--;
            if(c > 0) status.innerText = c;
            else { clearInterval(t); status.style.display = 'none'; iniciarGravacao(); }
        }, 1000);
    };

    function iniciarGravacao() {
        chunks = [];
        const config = JSON.parse(localStorage.getItem('config_atual'));
        const tempo = (config ? parseInt(config.tempo) : 10) * 1000;

        const loop = () => {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            if (molduraImg.complete) {
                ctx.drawImage(molduraImg, 0, 0, canvas.width, canvas.height);
            }
            if (recorder && recorder.state === "recording") requestAnimationFrame(loop);
        };

        const stream = canvas.captureStream(30);
        recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8' });
        
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = async () => {
            document.getElementById('loading').style.display = 'flex';
            const blob = new Blob(chunks, { type: 'video/webm' });
            const fd = new FormData();
            fd.append("video", blob);
            fd.append("uuid", "vid_" + Date.now());
            fd.append("evento", config ? config.nome : "Geral");

            await fetch("https://photomovie.maxprimefotovideo.workers.dev/upload", { method: "POST", body: fd });
            window.location.href = "galeria.html";
        };

        recorder.start();
        loop();
        setTimeout(() => recorder.stop(), tempo);
    }
</script>
</body>
</html>
