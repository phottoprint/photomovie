<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHOTO MOVIE Pro - Camera</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --neon: #9200ff; }
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow-x: hidden; }

        .screen { display: none; min-height: 100vh; width: 100vw; flex-direction: column; align-items: center; position: absolute; }
        .active { display: flex; }

        /* CAMERA */
        #cam-container { width: 100%; height: 100vh; position: relative; background: #000; overflow: hidden; }
        #vid-preview { width: 100%; height: 100%; object-fit: cover; }
        
        .controls { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: space-evenly; align-items: center; z-index: 100; }
        .shutter { width: 70px; height: 70px; border: 4px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .shutter-inner { width: 55px; height: 55px; background: red; border-radius: 50%; }
        .btn-ui { background: rgba(0,0,0,0.6); border: 1px solid #555; color: white; width: 50px; height: 50px; border-radius: 50%; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }

        #status-msg { position: fixed; inset: 0; z-index: 1500; display: none; align-items: center; justify-content: center; font-size: 4rem; font-weight: 900; background: rgba(0,0,0,0.4); text-shadow: 2px 2px 10px #000; pointer-events: none; }

        /* GALERIA */
        .gallery-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr);
            gap: 10px; 
            padding: 15px; 
            width: 100%; 
            box-sizing: border-box; 
            margin-top: 20px;
            overflow-y: auto;
            max-height: 70vh;
        }
        .video-card { 
            aspect-ratio: 9/16; 
            background: #111; 
            border-radius: 8px; 
            overflow: hidden; 
            border: 1px solid #333; 
            position: relative;
        }
        .video-card video { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        /* MODAL E PLAYER */
        #modal-zoom { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #zoom-video { width: 85%; max-height: 60vh; border-radius: 12px; border: 2px solid var(--neon); }
        
        .btn-main { background: var(--neon); color: white; border: none; padding: 12px 25px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        .btn-danger { background: #ff3b30; color: white; border: none; padding: 10px; border-radius: 10px; margin-bottom: 10px; cursor: pointer; font-size: 11px; }
        
        .event-badge { position: fixed; top: 15px; left: 15px; background: rgba(0,0,0,0.7); padding: 8px 15px; border-radius: 20px; border: 1px solid var(--neon); font-size: 12px; z-index: 1000; color: var(--neon); font-weight: bold; }
    </style>
</head>
<body>

    <div id="evento-info-badge" class="event-badge" style="display:none;"></div>

    <div id="screen-camera" class="screen active">
        <div id="cam-container">
            <video id="vid-preview" autoplay playsinline muted></video>
            <img id="moldura-r2" src="" style="display:none;" crossorigin="anonymous">
            <canvas id="record-canvas" width="720" height="1280" style="display:none"></canvas>
            
            <div id="status-msg"></div>
            
            <div class="controls">
                <button class="btn-ui" onclick="irGaleria()">🎞️</button>
                <div class="shutter" onclick="iniciarContagem()">
                    <div class="shutter-inner"></div>
                </div>
                <button class="btn-ui" onclick="girarCamera()">🔄</button>
            </div>
        </div>
    </div>

    <div id="screen-gallery" class="screen" style="background: #000;">
        <h3 style="margin-top: 40px; color: var(--neon);">GALERIA DE VÍDEOS</h3>
        <button class="btn-danger" onclick="limparBanco()">🗑️ LIMPAR TODA MEMÓRIA</button>
        <div id="gallery-container" class="gallery-grid"></div>
        <button class="btn-main" style="margin: 20px 0; background:#333;" onclick="nav('screen-camera')">VOLTAR PARA CÂMERA</button>
    </div>

    <div id="modal-zoom">
        <video id="zoom-video" controls playsinline loop></video>
        <div id="qrcode-box" style="background:white; padding:10px; margin:15px 0; border-radius:10px;"></div>
        <div style="display:flex; gap:10px;">
            <button class="btn-main" onclick="fecharZoom()">FECHAR</button>
            <a id="download-btn" class="btn-main" style="text-decoration:none; background:#00c853;">BAIXAR</a>
        </div>
    </div>

<script>
    let db, stream, recorder, chunks = [], currentFacingMode = "environment";
    const video = document.getElementById('vid-preview');
    const canvas = document.getElementById('record-canvas');
    const ctx = canvas.getContext('2d');
    const frameImg = document.getElementById('moldura-r2');

    // Inicializa IndexedDB
    const req = indexedDB.open("PhotoMovieDB", 1);
    req.onupgradeneeded = e => { e.target.result.createObjectStore("movies", { keyPath: "id", autoIncrement: true }); };
    req.onsuccess = e => { db = e.target.result; };

    window.onload = () => {
        // Puxa a configuração salva no Novo Evento
        const configSessao = JSON.parse(localStorage.getItem('config_atual'));
        const badge = document.getElementById('evento-info-badge');

        if(configSessao) {
            badge.innerText = "🎬 " + configSessao.nome;
            badge.style.display = 'block';
            
            // Define o link da moldura que veio do Cloudflare
            if(configSessao.moldura) {
                frameImg.src = configSessao.moldura;
            }
        }
        
        ligarCamera();
    };

    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        const badge = document.getElementById('evento-info-badge');
        badge.style.display = (id === 'screen-camera') ? 'block' : 'none';
    }

    async function ligarCamera() {
        if (stream) stream.getTracks().forEach(t => t.stop());
        try {
            stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: currentFacingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
                audio: false
            });
            video.srcObject = stream;
            video.play();
        } catch (err) { alert("Câmera não encontrada."); }
    }

    function girarCamera() {
        currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
        ligarCamera();
    }

    function iniciarContagem() {
        let c = 3;
        const msg = document.getElementById('status-msg');
        msg.style.display = 'flex';
        msg.innerText = c;
        let t = setInterval(() => {
            c--;
            if(c > 0) msg.innerText = c;
            else { clearInterval(t); msg.innerText = "GRAVANDO"; gravar(); }
        }, 1000);
    }

    function gravar() {
        chunks = [];
        const configSessao = JSON.parse(localStorage.getItem('config_atual'));
        const tempoGravacao = configSessao ? parseInt(configSessao.tempo) : 10;
        
        const drawLoop = () => {
            // Desenha o vídeo da câmera no Canvas
            ctx.drawImage(video, 0, 0, 720, 1280);
            
            // Desenha a moldura (URL do Cloudflare) por cima
            if(frameImg.complete && frameImg.naturalWidth !== 0) {
                ctx.drawImage(frameImg, 0, 0, 720, 1280);
            }
            
            if(recorder && recorder.state === "recording") requestAnimationFrame(drawLoop);
        };

        const recStream = canvas.captureStream(30);
        recorder = new MediaRecorder(recStream, { mimeType: 'video/webm;codecs=vp8', videoBitsPerSecond: 5000000 });
        
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            // Salva no banco já processado com a moldura
            db.transaction("movies", "readwrite").objectStore("movies").add({ 
                video: blob,
                timestamp: new Date().getTime() 
            });
            irGaleria();
        };

        recorder.start();
        drawLoop();

        setTimeout(() => { 
            if(recorder.state === "recording") {
                recorder.stop(); 
                document.getElementById('status-msg').style.display = 'none'; 
            }
        }, tempoGravacao * 1000);
    }

    function irGaleria() {
        nav('screen-gallery');
        const cont = document.getElementById('gallery-container');
        cont.innerHTML = "";
        db.transaction("movies", "readonly").objectStore("movies").openCursor(null, 'prev').onsuccess = e => {
            const cursor = e.target.result;
            if(cursor) {
                const url = URL.createObjectURL(cursor.value.video);
                cont.innerHTML += `<div class="video-card" onclick="abrirZoom('${url}')"><video src="${url}" muted playsinline></video></div>`;
                cursor.continue();
            }
        };
    }

    function abrirZoom(url) {
        const v = document.getElementById('zoom-video');
        const dl = document.getElementById('download-btn');
        v.src = url;
        v.play();
        dl.href = url;
        dl.download = "video_360_" + Date.now() + ".webm";
        const qrb = document.getElementById('qrcode-box');
        qrb.innerHTML = "";
        new QRCode(qrb, { text: url, width: 130, height: 130 });
        document.getElementById('modal-zoom').style.display = 'flex';
    }

    function fecharZoom() {
        document.getElementById('modal-zoom').style.display = 'none';
        document.getElementById('zoom-video').pause();
    }

    function limparBanco() {
        if(confirm("Apagar todos os vídeos desta sessão?")) {
            const tx = db.transaction("movies", "readwrite");
            tx.objectStore("movies").clear();
            tx.oncomplete = () => irGaleria();
        }
    }
</script>
</body>
</html>
