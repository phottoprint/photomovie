<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHOTO MOVIE Pro - Camera</title>
    <style>
        :root { 
            --turquesa-dark: #008b8b; 
            --dourado: #c5a059; 
            --laranja: #ff8c00;
            --verde-neon: #39ff14;
            --vermelho-neon: #ff0000;
        }
        
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }

        .screen { display: none; min-height: 100vh; width: 100vw; flex-direction: column; align-items: center; position: absolute; }
        .active { display: flex; }

        #cam-container { width: 100%; height: 100vh; position: relative; background: #000; overflow: hidden; }
        #vid-preview { width: 100%; height: 100%; object-fit: cover; }
        
        .event-badge { 
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%); 
            background: rgba(0,0,0,0.6); padding: 10px 25px; border-radius: 30px; 
            border: 1px solid var(--dourado); font-size: 14px; z-index: 1000; 
            color: var(--dourado); font-weight: bold; text-transform: uppercase;
            backdrop-filter: blur(5px); white-space: nowrap;
        }

        .controls { position: absolute; bottom: 80px; width: 100%; display: flex; justify-content: center; align-items: center; z-index: 100; }

        /* Novo Obturador: Dourado com Pulso Verde */
        .shutter { 
            width: 90px; height: 90px; background: var(--dourado); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; border: 4px solid white;
            animation: pulse-verde 2s infinite;
        }

        @keyframes pulse-verde {
            0% { box-shadow: 0 0 0 0 rgba(57, 255, 20, 0.8); }
            70% { box-shadow: 0 0 0 20px rgba(57, 255, 20, 0); }
            100% { box-shadow: 0 0 0 0 rgba(57, 255, 20, 0); }
        }

        .btn-ui-flip { 
            position: absolute; right: 30px; background: rgba(0,0,0,0.5); 
            border: 1px solid rgba(255,255,255,0.3); color: white; 
            width: 55px; height: 55px; border-radius: 50%; font-size: 1.5rem; 
            display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px);
        }

        /* Status de Mensagens */
        #status-msg { 
            position: fixed; inset: 0; z-index: 1500; display: none; flex-direction: column;
            align-items: center; justify-content: center; font-weight: 900; 
            background: rgba(0,0,0,0.4); pointer-events: none; text-align: center;
        }

        .msg-contagem { font-size: 8rem; color: white; }
        .msg-finalizando { font-size: 3rem; color: var(--laranja); animation: blink 0.6s infinite; }
        
        /* Vermelho Neon Pulsante */
        .msg-finalizado { 
            font-size: 4rem; color: var(--vermelho-neon); 
            text-shadow: 0 0 10px var(--vermelho-neon), 0 0 20px var(--vermelho-neon);
            animation: pulse-red 0.5s infinite alternate; 
        }

        @keyframes pulse-red { from { transform: scale(1); opacity: 0.8; } to { transform: scale(1.1); opacity: 1; } }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }

        #upload-loading { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; display: none; flex-direction: column; align-items: center; justify-content: center; color: var(--turquesa-dark); }
        
        /* Overlay invisível para capturar o toque final */
        #tap-to-continue { position: fixed; inset: 0; z-index: 2000; display: none; }
    </style>
</head>
<body onclick="checarToqueFinal()">

    <div id="evento-info-badge" class="event-badge" style="display:none;"></div>
    <div id="tap-to-continue"></div>

    <div id="upload-loading">
        <div style="font-size: 24px; margin-bottom: 10px; font-weight: bold;">ENVIANDO VÍDEO...</div>
        <small style="color: white;">Aguarde o processamento</small>
    </div>

    <div id="screen-camera" class="screen active">
        <div id="cam-container">
            <video id="vid-preview" autoplay playsinline muted></video>
            <img id="moldura-r2" src="" style="display:none;" crossorigin="anonymous">
            <canvas id="record-canvas" width="720" height="1280" style="display:none;"></canvas>
            
            <div id="status-msg"></div>
            
            <div class="controls">
                <div class="shutter" onclick="iniciarContagem()">
                    <div style="width: 25px; height: 25px; background: #000; border-radius: 4px;"></div>
                </div>
                <button class="btn-ui-flip" onclick="girarCamera()">🔄</button>
            </div>
        </div>
    </div>

<script>
    let stream, recorder, chunks = [], currentFacingMode = "environment", prontoParaSair = false;
    const video = document.getElementById('vid-preview');
    const canvas = document.getElementById('record-canvas');
    const ctx = canvas.getContext('2d');
    const frameImg = document.getElementById('moldura-r2');
    const msg = document.getElementById('status-msg');
    
    const WORKER_URL = "https://photomovie.maxprimefotovideo.workers.dev"; 

    window.onload = () => {
        const configSessao = JSON.parse(localStorage.getItem('config_atual'));
        if(configSessao) {
            document.getElementById('evento-info-badge').innerText = configSessao.nome;
            document.getElementById('evento-info-badge').style.display = 'block';
            if(configSessao.moldura) frameImg.src = configSessao.moldura;
        }
        ligarCamera();
    };

    async function ligarCamera() {
        if (stream) stream.getTracks().forEach(t => t.stop());
        const constraints = {
            video: { facingMode: currentFacingMode, width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 30 } },
            audio: false
        };
        try {
            stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
            await video.play();
        } catch (err) {
            // Fallback para câmeras que não suportam ideal 720p
            stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
            video.srcObject = stream;
        }
    }

    function girarCamera() {
        currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
        ligarCamera();
    }

    function iniciarContagem() {
        let c = 3;
        msg.className = "msg-contagem"; 
        msg.style.display = 'flex';
        msg.innerText = c;

        let t = setInterval(() => {
            c--;
            if(c > 0) msg.innerText = c;
            else { 
                clearInterval(t); 
                msg.style.display = 'none';
                gravar(); 
            }
        }, 1000);
    }

    function gravar() {
        chunks = [];
        const configSessao = JSON.parse(localStorage.getItem('config_atual'));
        const tempoTotal = configSessao ? parseInt(configSessao.tempo) : 10;
        const nomeEvento = configSessao ? configSessao.nome : "Geral";
        
        const drawLoop = () => {
            ctx.drawImage(video, 0, 0, 720, 1280);
            if(frameImg.complete && frameImg.src !== "") ctx.drawImage(frameImg, 0, 0, 720, 1280);
            if(recorder && recorder.state === "recording") requestAnimationFrame(drawLoop);
        };

        const recStream = canvas.captureStream(30);
        recorder = new MediaRecorder(recStream, { mimeType: 'video/webm;codecs=vp8', videoBitsPerSecond: 3500000 });
        
        recorder.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };
        
        recorder.onstop = async () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            await realizarUpload(blob, nomeEvento);
        };

        recorder.start();
        drawLoop();

        let segundos = 0;
        let timer = setInterval(() => {
            segundos++;
            if (segundos === (tempoTotal - 3)) {
                msg.style.display = 'flex';
                msg.innerText = "FINALIZANDO";
                msg.className = "msg-finalizando";
            }
            if (segundos >= tempoTotal) {
                clearInterval(timer);
                if(recorder.state === "recording") recorder.stop();
            }
        }, 1000);
    }

    async function realizarUpload(blob, evento) {
        document.getElementById('upload-loading').style.display = 'flex';
        msg.style.display = 'none';
        
        const uuid = "vid_" + Date.now();
        const formData = new FormData();
        formData.append("video", blob);
        formData.append("uuid", uuid);
        formData.append("evento", evento);

        try {
            const res = await fetch(`${WORKER_URL}/upload`, { method: 'POST', body: formData });
            if(res.ok) {
                document.getElementById('upload-loading').style.display = 'none';
                // Exibe o aviso Neon e habilita o toque para sair
                msg.innerText = "FINALIZADO\n(toque para continuar)";
                msg.className = "msg-finalizado";
                msg.style.display = 'flex';
                msg.style.whiteSpace = "pre-line";
                prontoParaSair = true;
                document.getElementById('tap-to-continue').style.display = 'block';
            }
        } catch (e) { 
            alert("Erro na rede. Tente novamente.");
            document.getElementById('upload-loading').style.display = 'none';
        }
    }

    function checarToqueFinal() {
        if(prontoParaSair) {
            window.location.href = 'galeria.html';
        }
    }
</script>
</body>
</html>
