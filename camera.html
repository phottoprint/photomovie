<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Câmera Pro - PHOTO MOVIE v1.0</title>
    <style>
        :root { --turquesa: #00d1d1; --dourado: #c5a059; --preto: #000; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        
        #cam-container { width: 100vw; height: 100vh; position: relative; display: flex; flex-direction: column; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .mirror { transform: scaleX(-1); }
        
        #moldura-view { 
            position: absolute; inset: 0; width: 100%; height: 100%; 
            pointer-events: none; object-fit: fill; z-index: 10; 
            display: none; 
        }

        /* Nome do Evento na Tela */
        .event-overlay {
            position: absolute; top: 30px; width: 100%; text-align: center;
            z-index: 20; color: var(--dourado); text-transform: uppercase;
            letter-spacing: 3px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .controls-wrapper {
            position: absolute; bottom: 80px; width: 100%;
            display: flex; align-items: center; justify-content: space-around;
            z-index: 100;
        }

        /* Botões de Ação Inferiores */
        .side-btn {
            background: rgba(0,0,0,0.5); border: 1px solid var(--dourado);
            color: var(--dourado); width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 20px; backdrop-filter: blur(5px);
        }

        /* Obturador Dourado Pulsante */
        .shutter-container { position: relative; display: flex; align-items: center; justify-content: center; }
        .shutter { 
            width: 75px; height: 75px; border-radius: 50%; 
            background: transparent; border: 4px solid var(--dourado); 
            cursor: pointer; position: relative; z-index: 105;
            transition: transform 0.2s;
        }
        .shutter:active { transform: scale(0.9); }

        /* Animação de Pulso */
        .shutter::after {
            content: ''; position: absolute; inset: -10px;
            border-radius: 50%; border: 2px solid var(--dourado);
            animation: pulse-gold 1.5s infinite; opacity: 0;
        }

        @keyframes pulse-gold {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        #status { position: fixed; inset: 0; display: none; background: rgba(0,0,0,0.4); color: var(--dourado); font-size: 120px; align-items: center; justify-content: center; z-index: 200; font-weight: 900; }
        
        #loading { 
            position: fixed; inset: 0; display: none; background: #000; color: var(--turquesa); 
            align-items: center; justify-content: center; z-index: 300; flex-direction: column; gap: 15px; 
        }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--turquesa); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .version-badge { position: fixed; bottom: 10px; right: 10px; font-size: 10px; color: rgba(255,255,255,0.3); z-index: 1000; font-weight: bold; }
    </style>
</head>
<body>

    <div id="cam-container">
        <div class="event-overlay" id="txt-evento">PHOTO MOVIE</div>
        
        <video id="preview" autoplay playsinline muted></video>
        <img id="moldura-view" alt="moldura">

        <div class="controls-wrapper">
            <div class="side-btn" onclick="window.location.href='index.html'">✕</div>
            
            <div class="shutter-container">
                <div class="shutter" id="btn-shoot"></div>
            </div>

            <div class="side-btn" onclick="toggleCamera()">🔄</div>
        </div>
    </div>

    <canvas id="canvas" width="720" height="1280" style="display:none;"></canvas>
    <div id="status"></div>
    <div id="loading">
        <div class="spinner"></div>
        <b style="letter-spacing: 2px;">PROCESSANDO E ENVIANDO...</b>
    </div>
    
    <div class="version-badge">v2.5</div>

<script>
    const WORKER_URL = "https://photomovie.maxprimefotovideo.workers.dev";
    const video = document.getElementById('preview');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const btn = document.getElementById('btn-shoot');
    const view = document.getElementById('moldura-view');
    const txtEvento = document.getElementById('txt-evento');
    
    let currentStream;
    let useFrontCamera = false;
    let isRecording = false;
    const molduraImg = new Image();
    molduraImg.crossOrigin = "anonymous"; 

    async function startCamera() {
        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
        }
        const constraints = {
            video: { 
                facingMode: useFrontCamera ? "user" : "environment", 
                width: { ideal: 1280 }, height: { ideal: 720 } 
            },
            audio: false
        };
        try {
            currentStream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = currentStream;
            if (useFrontCamera) {
                video.classList.add('mirror');
            } else {
                video.classList.remove('mirror');
            }
        } catch (e) { alert("Erro ao acessar câmera."); }
    }

    function toggleCamera() {
        useFrontCamera = !useFrontCamera;
        startCamera();
    }

    window.onload = async () => {
        const config = JSON.parse(localStorage.getItem('config_atual'));
        if (config) {
            txtEvento.innerText = config.nome || "WEBCAM";
            let molduraPath = config.molduraUrl || config.moldura;
            if (molduraPath) {
                const cleanId = molduraPath.includes('id=') ? molduraPath.split('id=')[1] : molduraPath;
                const urlFinal = `${WORKER_URL}/stream?id=${cleanId}`;
                molduraImg.src = urlFinal;
                view.src = urlFinal;
                molduraImg.onload = () => view.style.display = 'block';
            }
        }
        startCamera();
    };

    btn.onclick = () => {
        if (isRecording) return;
        let c = 3;
        const status = document.getElementById('status');
        status.style.display = 'flex';
        status.innerText = c;
        
        let t = setInterval(() => {
            c--;
            if(c > 0) status.innerText = c;
            else { 
                clearInterval(t); 
                status.style.display = 'none'; 
                iniciarGravacao(); 
            }
        }, 1000);
    };

    function iniciarGravacao() {
        isRecording = true;
        const chunks = [];
        const config = JSON.parse(localStorage.getItem('config_atual'));
        const tempo = (config ? parseInt(config.tempo) : 10) * 1000;
        const nomeEvento = config ? (config.id_fixo || config.nome) : "Geral";

        let recorder;

        const loop = () => {
            if (!isRecording || video.paused || video.ended) return;

            ctx.save();
            // Lógica de centralização inteligente proporcional (Cover automático)
            const videoRatio = video.videoWidth / video.videoHeight;
            const canvasRatio = canvas.width / canvas.height;
            let startX = 0, startY = 0, renderW = canvas.width, renderH = canvas.height;

            if (videoRatio > canvasRatio) {
                let vWidth = canvas.height * videoRatio;
                startX = (canvas.width - vWidth) / 2;
                renderW = vWidth;
            } else {
                let vHeight = canvas.width / videoRatio;
                startY = (canvas.height - vHeight) / 2;
                renderH = vHeight;
            }

            // Corrige e renderiza o espelhamento se a câmera frontal estiver ativa
            if (useFrontCamera) {
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
                ctx.drawImage(video, -startX, startY, -renderW, renderH);
            } else {
                ctx.drawImage(video, startX, startY, renderW, renderH);
            }
            ctx.restore();

            // Desenha a moldura por cima sem interferência de escala externa
            if (molduraImg.complete) {
                ctx.drawImage(molduraImg, 0, 0, canvas.width, canvas.height);
            }

            if (recorder && recorder.state === "recording") {
                requestAnimationFrame(loop);
            }
        };

        // Captura o stream em 30 FPS estáveis do Canvas
        const streamTarget = canvas.captureStream(30);
        
        // Configura fallback de codec robusto e amplamente aceito
        let options = { mimeType: 'video/webm;codecs=vp8', videoBitsPerSecond: 3000000 };
        try {
            recorder = new MediaRecorder(streamTarget, options);
        } catch(e) {
            // Fallback caso o navegador rejeite propriedades estritas de codec
            recorder = new MediaRecorder(streamTarget, { videoBitsPerSecond: 3000000 });
        }
        
        recorder.ondataavailable = e => { if(e.data && e.data.size > 0) chunks.push(e.data); };
        
        recorder.onstop = async () => {
            isRecording = false;
            document.getElementById('loading').style.display = 'flex';
            const blob = new Blob(chunks, { type: 'video/webm' });
            
            const fd = new FormData();
            fd.append("video", blob, "vid_" + Date.now() + ".webm");
            fd.append("uuid", "vid_" + Date.now() + ".webm");
            fd.append("evento", nomeEvento); 

            try {
                const res = await fetch(`${WORKER_URL}/upload`, { method: "POST", body: fd });
                if(res.ok) {
                    setTimeout(() => { window.location.href = "galeria.html"; }, 800);
                } else {
                    alert("Erro no envio.");
                    document.getElementById('loading').style.display = 'none';
                }
            } catch (err) {
                alert("Falha na conexão com o servidor.");
                document.getElementById('loading').style.display = 'none';
            }
        };

        // Força a renderização do primeiro frame antes de disparar o gravador
        loop();
        recorder.start(100); // Fatiamento do buffer a cada 100ms para evitar estouro de memória
        
        setTimeout(() => { 
            if(recorder && recorder.state === "recording") {
                recorder.stop();
            }
        }, tempo);
    }
</script>
</body>
</html>
