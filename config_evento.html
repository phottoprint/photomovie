<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONFIGURAR EVENTO - Photo Movie</title>
    <style>
        :root { 
            --turquesa: #003333; 
            --dourado: #c5a059; 
            --dourado-fosco: #8e6d2d;
            --preto: #000;
        }
        
        body { 
            margin: 0; background: var(--preto); color: white; 
            font-family: 'Segoe UI', sans-serif; padding-bottom: 40px;
        }

        .header {
            background: var(--turquesa); padding: 25px; text-align: center;
            border-bottom: 2px solid var(--dourado);
        }
        .header h2 { color: var(--dourado); margin: 0; font-size: 28px; letter-spacing: 3px; }

        .container { padding: 20px; max-width: 500px; margin: 0 auto; }

        .section {
            background: #111; border: 1px solid #333; padding: 25px 20px;
            border-radius: 20px; margin-bottom: 20px;
        }

        .section h3 { 
            color: var(--dourado); margin-top: 0; font-size: 13px; 
            text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #222;
            padding-bottom: 12px; margin-bottom: 20px;
        }

        label { display: block; font-size: 12px; margin: 15px 0 10px 0; color: #aaa; font-weight: bold; }

        input[type="text"], input[type="number"], select {
            width: 100%; padding: 15px; background: #000; border: 1px solid #444;
            color: white; border-radius: 12px; box-sizing: border-box; font-size: 16px;
        }

        .time-selector { display: flex; justify-content: center; gap: 15px; }
        .time-btn {
            background: #222; border: 1px solid #444; color: #888;
            width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-weight: bold; font-size: 14px;
        }
        .time-btn.active { border-color: var(--dourado); color: var(--dourado); background: rgba(197, 160, 89, 0.1); }

        .action-box {
            width: 100%; padding: 18px; background: #1a1a1a; 
            border: 2px dashed var(--dourado); color: var(--dourado); 
            border-radius: 15px; text-align: center; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-sizing: border-box; font-weight: bold; gap: 10px;
        }

        .action-box.active-config { border-style: solid; background: rgba(197, 160, 89, 0.1); color: #fff; }

        /* PRESETS E VELOCIDADE */
        .preset-group { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .preset-btn {
            background: #1a1a1a; border: 1px solid #444; color: #fff;
            font-size: 10px; padding: 10px 12px; border-radius: 25px; cursor: pointer; text-transform: uppercase;
        }
        .preset-btn.active { background: var(--dourado); color: #000; border-color: var(--dourado); font-weight: bold; }

        .speed-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .speed-box { text-align: center; background: #000; padding: 10px; border-radius: 12px; border: 1px solid #333; }
        .speed-box span { font-size: 9px; display: block; margin-bottom: 8px; color: var(--dourado); font-weight: 900; }

        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 9999;
            display: none; align-items: center; justify-content: center;
        }
        .modal-content {
            width: 90%; max-width: 400px; background: #000; 
            border-radius: 30px; border: 1px solid var(--dourado);
            padding: 25px; display: flex; flex-direction: column; gap: 15px;
        }

        .btn-save-main {
            width: 100%; padding: 22px; background: linear-gradient(135deg, var(--dourado), var(--dourado-fosco));
            border: none; border-radius: 50px; color: #000; font-weight: 900;
            text-transform: uppercase; cursor: pointer; font-size: 16px; margin-top: 10px;
        }

        #frame-preview { 
            width: 100%; max-height: 150px; border: 1px solid #444; margin-top: 15px; 
            border-radius: 10px; object-fit: contain; display: none; background: #111;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>PHOTO MOVIE</h2>
    </div>

    <div class="container">
        <div class="section">
            <h3>1. Identificação e Tempo</h3>
            <label>NOME DO EVENTO</label>
            <input type="text" id="conf-nome" placeholder="Ex: Casamento Silva">
            
            <label style="text-align:center">DURAÇÃO DO VÍDEO</label>
            <div class="time-selector">
                <button class="time-btn" onclick="setTime(8, this)">8s</button>
                <button class="time-btn active" onclick="setTime(10, this)">10s</button>
                <button class="time-btn" onclick="setTime(12, this)">12s</button>
            </div>
            <input type="hidden" id="conf-tempo" value="10">
        </div>

        <div class="section">
            <h3>2. Velocidade (Timeline)</h3>
            <div class="preset-group">
                <button class="preset-btn" onclick="applyPreset('fast-slow-fast', this)">Fast-Slow</button>
                <button class="preset-btn" onclick="applyPreset('ultra-slow', this)">Ultra Slow</button>
                <button class="preset-btn" onclick="applyPreset('boomerang', this)">Boomerang</button>
                <button class="preset-btn" onclick="applyPreset('reverse', this)">Reverse FX</button>
            </div>
            
            <div class="speed-grid">
                <div class="speed-box"><span>INÍCIO</span>
                    <select id="speed-start">
                        <option value="2">2x (Rápido)</option>
                        <option value="1" selected>1x (Normal)</option>
                        <option value="0.5">0.5x (Lento)</option>
                    </select>
                </div>
                <div class="speed-box"><span>MEIO</span>
                    <select id="speed-mid">
                        <option value="1">1x (Normal)</option>
                        <option value="0.5" selected>0.5x (Lento)</option>
                        <option value="0.25">0.25x (Super)</option>
                    </select>
                </div>
                <div class="speed-box"><span>FIM</span>
                    <select id="speed-end">
                        <option value="2" selected>2x (Rápido)</option>
                        <option value="1">1x (Normal)</option>
                        <option value="0.5">0.5x (Lento)</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="section">
            <h3>3. Trilha Sonora</h3>
            <div class="action-box" id="btn-modal-musica" onclick="toggleModal('music-modal', true)">
                <span id="music-status-text">🎵 CONFIGURAR MÚSICA</span>
            </div>
        </div>

        <div class="section">
            <h3>4. Identidade Visual (Moldura)</h3>
            <div class="action-box" onclick="document.getElementById('file-moldura').click()">
                <span id="upload-label">📸 UPAR MOLDURA DO CELULAR</span>
                <input type="file" id="file-moldura" accept="image/png" style="display:none" onchange="subirArquivo(this, 'MOLDURA')">
            </div>
            <input type="hidden" id="conf-moldura-url">
            <center><img id="frame-preview"></center>
        </div>

        <button class="btn-save-main" onclick="salvarConfig()">SALVAR EVENTO</button>
        <p onclick="window.location.href='index.html'" style="text-align:center; color:#666; font-size:12px; margin-top:20px; cursor:pointer">Cancelar e Sair</p>
    </div>

    <div id="music-modal" class="modal">
        <div class="modal-content">
            <h4 style="color:var(--dourado); text-align:center; margin-top:0;">STUDIO MUSICAL</h4>
            
            <label>OPÇÃO A: LINK DO YOUTUBE</label>
            <input type="text" id="conf-musica-url" placeholder="Cole o link do YouTube aqui" oninput="atualizarSinalMusica()">
            
            <label>OPÇÃO B: UPAR MP3 DO CELULAR</label>
            <div class="action-box" style="font-size: 12px; padding: 12px;" onclick="document.getElementById('file-musica').click()">
                <span id="music-file-label">📤 ESCOLHER ARQUIVO MP3</span>
                <input type="file" id="file-musica" accept="audio/*" style="display:none" onchange="subirArquivo(this, 'MUSICA')">
            </div>

            <label>INICIAR MÚSICA EM (SEGUNDOS)</label>
            <input type="number" id="conf-musica-offset" value="0" placeholder="Ex: 10">

            <button class="btn-save-main" onclick="toggleModal('music-modal', false)">PRONTO</button>
        </div>
    </div>

<script>
    const WORKER_URL = "https://photomovie.maxprimefotovideo.workers.dev";

    function toggleModal(id, show) { document.getElementById(id).style.display = show ? 'flex' : 'none'; }
    
    function setTime(val, btn) {
        document.getElementById('conf-tempo').value = val;
        document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function applyPreset(type, btn) {
        document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const s = document.getElementById('speed-start');
        const m = document.getElementById('speed-mid');
        const e = document.getElementById('speed-end');

        if(type === 'fast-slow-fast') { s.value="2"; m.value="0.5"; e.value="2"; }
        if(type === 'ultra-slow') { s.value="1"; m.value="0.25"; e.value="1"; }
        if(type === 'boomerang') { s.value="1"; m.value="1"; e.value="1"; }
        if(type === 'reverse') { s.value="2"; m.value="0.5"; e.value="1"; }
    }

    function atualizarSinalMusica() {
        const url = document.getElementById('conf-musica-url').value;
        const btn = document.getElementById('btn-modal-musica');
        const statusText = document.getElementById('music-status-text');

        if (url && url.length > 5) {
            btn.classList.add('active-config');
            statusText.innerText = "✅ MÚSICA CONFIGURADA";
        } else {
            btn.classList.remove('active-config');
            statusText.innerText = "🎵 CONFIGURAR MÚSICA";
        }
    }

    async function subirArquivo(input, tipo) {
        if(!input.files || !input.files[0]) return;
        const file = input.files[0];
        const label = tipo === 'MOLDURA' ? document.getElementById('upload-label') : document.getElementById('music-file-label');
        const preview = document.getElementById('frame-preview');
        label.innerText = "⏳ ENVIANDO...";
        
        const formData = new FormData();
        formData.append("video", file);
        formData.append("uuid", tipo.toLowerCase() + "_" + Date.now());
        formData.append("evento", tipo === 'MOLDURA' ? "MOLDURAS_SISTEMA" : "MUSICAS_SISTEMA");

        try {
            const res = await fetch(`${WORKER_URL}/upload`, { method: 'POST', body: formData });
            if(res.ok) {
                const data = await res.json();
                const linkFinal = `${WORKER_URL}/stream?id=${data.path}`;
                if(tipo === 'MOLDURA') {
                    document.getElementById('conf-moldura-url').value = linkFinal;
                    setTimeout(() => {
                        preview.src = linkFinal;
                        preview.style.display = "block";
                        label.innerText = "✅ MOLDURA CARREGADA!";
                    }, 800);
                } else {
                    document.getElementById('conf-musica-url').value = linkFinal;
                    label.innerText = "✅ MP3 CARREGADO!";
                    atualizarSinalMusica();
                }
            }
        } catch (e) { label.innerText = "❌ ERRO AO SUBIR"; }
    }

    function salvarConfig() {
        const nomeEvento = document.getElementById('conf-nome').value.trim();
        
        if (!nomeEvento) {
            alert("Por favor, dê um nome ao evento.");
            return;
        }

        const novaConfig = {
            id: Date.now(),
            nome: nomeEvento,
            data: new Date().toLocaleDateString('pt-BR'),
            tempo: document.getElementById('conf-tempo').value,
            moldura: document.getElementById('conf-moldura-url').value || "", 
            velocidades: {
                inicio: document.getElementById('speed-start').value,
                meio: document.getElementById('speed-mid').value,
                fim: document.getElementById('speed-end').value
            },
            musicaUrl: document.getElementById('conf-musica-url').value,
            musicaOffset: document.getElementById('conf-musica-offset').value || 0
        };

        // Salva o evento atual como ativo
        localStorage.setItem('evento_ativo', novaConfig.nome);
        localStorage.setItem('config_atual', JSON.stringify(novaConfig));
        
        // Adiciona à lista geral de eventos
        let eventos = JSON.parse(localStorage.getItem('meus_eventos')) || [];
        eventos.push(novaConfig);
        localStorage.setItem('meus_eventos', JSON.stringify(eventos));

        alert("Evento salvo com sucesso!");
        
        // --- AQUI ESTÁ A CORREÇÃO ---
        // Certifique-se que o nome do seu arquivo principal seja 'index.html'
        window.location.href = 'index.html'; 
    }
</script>
</body>
</html>
