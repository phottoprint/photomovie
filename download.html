<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Vídeo 360</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; padding: 20px; margin:0; display:flex; flex-direction:column; align-items:center; }
        video { width: 100%; max-width: 400px; border-radius: 15px; background: #111; margin-bottom:20px; }
        .btn { display: block; width: 100%; max-width: 300px; padding: 18px; margin-bottom: 12px; border-radius: 10px; font-weight: bold; text-decoration: none; border:none; cursor:pointer; }
        .btn-dl { background: #9200ff; color: white; }
        .btn-qr { background: white; color: black; }
        #qr-container { background: white; padding: 20px; border-radius: 15px; display: none; margin-top: 10px; }
    </style>
</head>
<body>
    <h2 id="status">SEU VÍDEO</h2>
    <video id="player" controls playsinline></video>

    <a id="link-dl" class="btn btn-dl" href="#" download>BAIXAR VÍDEO</a>
    <button class="btn btn-qr" onclick="gerarQR()">GERAR QR CODE</button>

    <div id="qr-container">
        <div id="qrcode"></div>
        <p style="color:black; margin-top:10px; font-size:12px;">Escaneie para compartilhar!</p>
        <button onclick="document.getElementById('qr-container').style.display='none'" style="margin-top:10px; border:none; background:none; color:red; font-weight:bold;">FECHAR</button>
    </div>

    <script>
        const p = new URLSearchParams(window.location.search);
        const id = p.get('id');
        const videoUrl = `https://photomovie.maxprimefotovideo.workers.dev/stream?id=${id}`;
        
        const player = document.getElementById('player');
        player.src = videoUrl;
        document.getElementById('link-dl').href = videoUrl;

        function gerarQR() {
            const container = document.getElementById('qr-container');
            container.style.display = 'block';
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), {
                text: window.location.href,
                width: 200,
                height: 200
            });
        }
    </script>
</body>
</html>
