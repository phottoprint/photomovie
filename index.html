<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHOTO MOVIE Pro - Hardware Fix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --neon: #9200ff; --bg: #000; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        .brand-header {
            position: fixed; top: 0; width: 100%; text-align: center;
            padding: 20px 0; z-index: 1000; background: linear-gradient(to bottom, black, transparent);
            pointer-events: none;
        }
        .neon-title { 
            font-size: 2.5rem; font-weight: 900; color: var(--neon); margin: 0;
            text-shadow: 0 0 15px var(--neon);
        }

        .screen { display: none; min-height: 100vh; width: 100vw; flex-direction: column; align-items: center; position: absolute; }
        .active { display: flex; }

        /* AJUSTE PARA TIRAR O ESBRANQUIÇADO */
        #vid-preview { 
            width: 100%; height: 100%; object-fit: cover; 
            filter: contrast(1.1) brightness(1.1); /* Melhora a nitidez da lente */
        }
        
        #cam-container { width: 100vw; height: 100vh; position: relative; background: #000; }
        #moldura-layer { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; pointer-events: none; z-index: 10; }
        
        /* CONTROLES */
        .controls { position: absolute; bottom: 80px; width: 100%; display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .shutter { width: 80px; height: 80px; border: 5px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .shutter-inner { width: 60px; height: 60px; background: red; border-radius: 50%; }
        
        /* BOTÃO DE GIRAR CÂMERA */
        .btn-hardware { 
            background: rgba(0,0,0,0.6); border: 2px solid var(--neon); color: white; 
            width: 55px; height: 55px; border-radius: 50%; font-size: 1.5rem; 
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        #status-msg { position: fixed; inset: 0; z-index: 1500; display: none; align-items: center; justify-content: center; font-size: 6rem; font-weight: 900; background: rgba(0,0,0,0.4); }
        .gallery-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; margin-top: 120px; width: 100%; box-sizing: border-box; }
        .video-card { aspect-ratio: 9/16; background: #111; border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        .video-card video { width: 100%; height: 100%; object-fit: cover; }

        #modal-zoom { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .btn-main { background: var(--neon); color: white; border: none; padding: 15px 40px; border-radius: 30px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="brand-header">
        <h1 class="neon-title">PHOTO MOVIE</h1>
    </div>

    <div id="screen-menu" class="screen active">
        <div style="margin-top: 140px; width: 85%; background: #111; padding: 25px; border-radius: 20px;">
            <h3 style="color:var(--neon)">CONFIGURAR EVENTO</h3>
            <input type="text" id="event-name" placeholder="Nome do Evento" style="width:100%; padding:15px; margin:10px 0; background:#000; border:1px solid #333; color:white; border-radius:10px;">
            <input type="file" id="event-frame" accept="image/png">
            <button class="btn-main" style="width:100%; margin-top:15px;" onclick="criarEvento()">ABRIR CÂMERA</button>
        </div>
    </div>

    <div id="screen-camera" class="screen">
        <div id="cam-container">
            <video id="vid-preview" autoplay playsinline muted></video>
            <img id="moldura-layer" src="" alt="">
            <canvas id="hidden-canvas" width="720" height="1280" style="display:none"></canvas>
            
            <div id="status-msg"></div>

            <div class="controls">
                <button class="btn-hardware" onclick="irGaleria()">🎞️</button>
                <div class="shutter" onclick="contagem()">
                    <div class="shutter-inner"></div>
                </div>
                <button class="btn-hardware" onclick="alternarCamera()">🔄</button>
            </div>
        </div>
    </div>

    <div id="screen-gallery" class="screen">
        <div id="gallery-container" class="gallery-grid"></div>
        <button class="btn-main" style="margin-top:20px; background:#222;" onclick="nav('screen-camera')">VOLTAR</button>
    </div>

    <div id="modal-zoom">
        <video id="zoom-video" style="width:90%; border-radius:15px;" controls autoplay loop></video>
        <div id="qrcode-box" style="background:white; padding:10px; margin:15px 0; border-radius:10px;"></div>
        <button class="btn-main" onclick="fecharZoom()">FECHAR</button>
    </div>

<script>
    let db, activeFrame, recorder, stream;
    let modoCamera = "environment"; // Inicia pela traseira
    const video = document.getElementById('vid-preview');
    const canvas = document.getElementById('hidden-canvas');
    const ctx = canvas.getContext('2d');

    // DB
    const req = indexedDB.open("PhotoMovieDB", 1);
    req.onupgradeneeded = e => {
        db = e.target.result;
        db.createObjectStore("movies", { keyPath: "id", autoIncrement: true });
    };
    req.onsuccess = e => { db = e.target.result; };

    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'screen-camera') iniciarCamera();
    }

    function criarEvento() {
        const file = document.getElementById('event-frame').files[0];
        if(!file) return alert("Selecione a moldura PNG!");
        const reader = new FileReader();
        reader.onload = e => {
            activeFrame = e.target.result;
            document.getElementById('moldura-layer').src = activeFrame;
            nav('screen-camera');
        };
        reader.readAsDataURL(file);
    }

    // FUNÇÃO PARA INVERTER CÂMERA
    async function alternarCamera() {
        modoCamera = (modoCamera === "environment") ? "user" : "environment";
        await iniciarCamera();
    }

    async function iniciarCamera() {
        if(stream) stream.getTracks().forEach(t => t.stop());
        
        const constraints = {
            video: { 
                facingMode: modoCamera, // Usa a variável de modo
                width: { ideal: 1280 },
                height: { ideal: 720 }
            },
            audio: false 
        };

        try {
            stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
        } catch (err) {
            console.error("Erro na câmera:", err);
            // Se falhar o modo 'environment', tenta o padrão
            stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
        }
    }

    function contagem() {
        let c = 3;
        const msg = document.getElementById('status-msg');
        msg.style.display = 'flex';
        msg.innerText = c;
        let t = setInterval(() => {
            c--;
            if(c>0) msg.innerText = c;
            else { clearInterval(t); msg.innerText = ""; gravar(); }
        }, 1000);
    }

    function gravar() {
        let chunks = [];
        const recordLoop = () => {
            ctx.drawImage(video, 0, 0, 720, 1280);
            const img = document.getElementById('moldura-layer');
            if(img.src) ctx.drawImage(img, 0, 0, 720, 1280);
            if(recorder && recorder.state === "recording") requestAnimationFrame(recordLoop);
        };

        const recStream = canvas.captureStream(30);
        recorder = new MediaRecorder(recStream, { mimeType: 'video/webm;codecs=vp8', videoBitsPerSecond: 5000000 });
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            salvarVideo(blob);
        };
        recorder.start();
        recordLoop();

        let tempo = 10;
        const msg = document.getElementById('status-msg');
        const countdown = setInterval(() => {
            tempo--;
            msg.innerText = tempo + "s";
            if(tempo <= 0) { clearInterval(countdown); recorder.stop(); irGaleria(); }
        }, 1000);
    }

    function salvarVideo(blob) {
        const reader = new FileReader();
        reader.onload = e => {
            db.transaction("movies", "readwrite").objectStore("movies").add({ video: e.target.result });
        };
        reader.readAsDataURL(blob);
    }

    function irGaleria() {
        nav('screen-gallery');
        const cont = document.getElementById('gallery-container');
        cont.innerHTML = "";
        db.transaction("movies", "readonly").objectStore("movies").openCursor(null, 'prev').onsuccess = e => {
            const cursor = e.target.result;
            if(cursor) {
                cont.innerHTML += `<div class="video-card" onclick="abrirZoom('${cursor.value.video}')"><video src="${cursor.value.video}" muted></video></div>`;
                cursor.continue();
            }
        };
    }

    function abrirZoom(url) {
        document.getElementById('zoom-video').src = url;
        const qrb = document.getElementById('qrcode-box');
        qrb.innerHTML = "";
        new QRCode(qrb, { text: url, width: 180, height: 180 });
        document.getElementById('modal-zoom').style.display = 'flex';
    }

    function fecharZoom() {
        document.getElementById('modal-zoom').style.display = 'none';
        document.getElementById('zoom-video').pause();
    }
</script>
</body>
</html>
