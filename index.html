<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Photo Movie</title>
    <style>
        :root { --primary: #00d1d1; --bg: #0a0a0a; --card: #161616; --text: #eee; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        
        .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        .header h1 { margin: 0; color: var(--primary); letter-spacing: 2px; }

        .card { background: var(--card); padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 30px; border: 1px solid #222; }
        h2 { margin-top: 0; font-size: 1.2rem; color: var(--primary); text-transform: uppercase; }

        .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        
        label { font-size: 0.9rem; font-weight: bold; color: #888; }
        input { background: #222; border: 1px solid #333; padding: 12px; border-radius: 8px; color: #fff; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0,209,209,0.2); }

        .btn-main { background: var(--primary); color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; text-transform: uppercase; margin-top: 10px; }
        .btn-main:hover { background: #00b8b8; transform: translateY(-2px); }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: var(--card); border-radius: 10px; overflow: hidden; }
        th { background: #222; color: var(--primary); text-align: left; padding: 15px; font-size: 0.8rem; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #222; font-size: 0.9rem; }
        
        .actions { display: flex; gap: 10px; }
        .btn-open { background: #28a745; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .btn-del { background: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        
        .loading-bar { display: none; width: 100%; height: 4px; background: #222; margin-top: 15px; position: relative; overflow: hidden; }
        .loading-bar::after { content: ''; width: 40%; height: 100%; background: var(--primary); position: absolute; animation: load 1.5s infinite; }
        @keyframes load { 0% { left: -40%; } 100% { left: 100%; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>MAX PHOTO MOVIE</h1>
        </div>

        <div class="card">
            <h2>Novo Evento</h2>
            <div class="grid-form">
                <div class="input-group">
                    <label>Nome do Evento</label>
                    <input type="text" id="ev-nome" placeholder="Ex: Casamento João e Maria">
                </div>
                <div class="input-group">
                    <label>Data</label>
                    <input type="date" id="ev-data">
                </div>
                <div class="input-group">
                    <label>Tempo de Gravação (segundos)</label>
                    <input type="number" id="ev-tempo" value="10">
                </div>
                <div class="input-group">
                    <label>Moldura (PNG)</label>
                    <input type="file" id="ev-moldura" accept="image/png">
                </div>
                <div class="input-group" style="grid-column: span 2;">
                    <label>Música de Fundo (MP3)</label>
                    <input type="file" id="ev-musica" accept="audio/mpeg">
                </div>
            </div>
            <button class="btn-main" onclick="salvarEvento()">Criar Evento</button>
            <div id="loader" class="loading-bar"></div>
        </div>

        <div class="card">
            <h2>Gerenciar Eventos</h2>
            <table id="tabela-eventos">
                <thead>
                    <tr>
                        <th>Evento</th>
                        <th>Data</th>
                        <th>Tempo</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>
    </div>

<script>
    const WORKER_URL = "https://photomovie.maxprimefotovideo.workers.dev";

    async function listarEventos() {
        try {
            const res = await fetch(`${WORKER_URL}/listar-eventos`);
            const dados = await res.json();
            const corpo = document.querySelector("#tabela-eventos tbody");
            corpo.innerHTML = "";

            dados.forEach(ev => {
                corpo.innerHTML += `
                    <tr>
                        <td><b>${ev.nome.replace(/_/g, ' ')}</b></td>
                        <td>${ev.data || '--/--/--'}</td>
                        <td>${ev.tempo}s</td>
                        <td class="actions">
                            <button class="btn-open" onclick="abrirEvento('${ev.id}', '${ev.nome}', '${ev.tempo}', '${ev.molduraUrl}', '${ev.musicaUrl}')">ABRIR</button>
                            <button class="btn-del" onclick="excluirEvento('${ev.id}', '${ev.nome}')">EXCLUIR</button>
                        </td>
                    </tr>
                `;
            });
        } catch (e) { console.error("Erro ao listar:", e); }
    }

    async function salvarEvento() {
        const nome = document.getElementById('ev-nome').value;
        const data = document.getElementById('ev-data').value;
        const tempo = document.getElementById('ev-tempo').value;
        const molduraFile = document.getElementById('ev-moldura').files[0];
        const musicaFile = document.getElementById('ev-musica').files[0];

        if (!nome) return alert("O nome do evento é obrigatório!");

        document.getElementById('loader').style.display = 'block';
        const nomeLimpo = nome.replace(/\s+/g, '_');
        let molduraUrl = "";
        let musicaUrl = "";

        try {
            if (molduraFile) {
                const fd = new FormData();
                fd.append("file", molduraFile);
                fd.append("uuid", "moldura.png");
                fd.append("evento", nomeLimpo);
                const res = await fetch(`${WORKER_URL}/upload`, { method: "POST", body: fd });
                const d = await res.json();
                molduraUrl = d.path;
            }

            if (musicaFile) {
                const fd = new FormData();
                fd.append("file", musicaFile);
                fd.append("uuid", "musica.mp3");
                fd.append("evento", nomeLimpo);
                const res = await fetch(`${WORKER_URL}/upload`, { method: "POST", body: fd });
                const d = await res.json();
                musicaUrl = d.path;
            }

            const payload = {
                id: Date.now().toString(),
                nome: nomeLimpo,
                data,
                tempo,
                molduraUrl,
                musicaUrl
            };

            await fetch(`${WORKER_URL}/salvar-evento`, {
                method: "POST",
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            alert("Evento criado com sucesso!");
            location.reload();
        } catch (err) {
            alert("Erro ao salvar evento.");
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    function abrirEvento(id, nome, tempo, moldura, musica) {
        localStorage.setItem('config_atual', JSON.stringify({ id, nome, tempo, moldura, musica }));
        window.location.href = "camera.html";
    }

    async function excluirEvento(id, nome) {
        if (!confirm(`Tem certeza que deseja apagar o evento ${nome}?`)) return;
        try {
            const res = await fetch(`${WORKER_URL}/excluir-evento?id=${id}&evento=${nome}`);
            if (res.ok) {
                alert("Evento removido!");
                listarEventos();
            }
        } catch (e) { alert("Erro ao excluir."); }
    }

    window.onload = listarEventos;
</script>
</body>
</html>
