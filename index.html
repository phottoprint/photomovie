<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHOTO MOVIE - Professional</title>
    <style>
        :root { --neon-purple: #bc13fe; --dark-bg: #050505; --card-bg: #121212; }
        body { margin: 0; background: var(--dark-bg); font-family: 'Segoe UI', sans-serif; color: white; }

        .screen { display: none; min-height: 100vh; padding: 20px; box-sizing: border-box; flex-direction: column; align-items: center; }
        .active { display: flex; }

        /* Identidade Visual Reutilizável */
        .brand-header { text-align: center; margin-bottom: 30px; }
        .neon-title { font-size: 2.2rem; text-shadow: 0 0 15px var(--neon-purple); margin: 0; }
        .subtitle { font-size: 0.9rem; letter-spacing: 2px; color: #ccc; margin-top: 5px; }

        /* Lista de Eventos */
        .event-list { width: 100%; max-width: 500px; margin-top: 20px; }
        .event-item { 
            background: var(--card-bg); padding: 15px; border-radius: 10px; 
            border: 1px solid #333; margin-bottom: 10px; display: flex; 
            justify-content: space-between; align-items: center;
        }

        /* Container 9:16 Estrito */
        .viewport-9-16 {
            position: relative; width: 100%; max-width: 350px; 
            aspect-ratio: 9 / 16; background: #000; 
            border: 2px solid var(--neon-purple); border-radius: 10px; overflow: hidden;
        }
        #video-preview { width: 100%; height: 100%; object-fit: cover; }
        #overlay-camera { position: absolute; inset: 0; pointer-events: none; background-size: 100% 100%; z-index: 5; }

        .btn-main { 
            background: var(--neon-purple); color: white; border: none; padding: 15px; 
            border-radius: 30px; font-weight: bold; cursor: pointer; width: 100%; max-width: 300px; margin-top: 10px;
        }
        .form-card { background: var(--card-bg); width: 100%; max-width: 500px; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: white; border-radius: 8px; margin: 10px 0; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="screen-home" class="screen active">
        <div class="brand-header">
            <h1 class="neon-title">PHOTO MOVIE</h1>
            <div class="subtitle">colecionando momentos</div>
        </div>
        
        <button class="btn-main" onclick="nav('screen-config')">+ NOVO EVENTO</button>

        <div class="event-list" id="lista-eventos">
            <p style="text-align:center; color:#555;">Nenhum evento criado.</p>
        </div>
    </div>

    <div id="screen-config" class="screen">
        <div class="brand-header">
            <h1 class="neon-title">PHOTO MOVIE</h1>
            <div class="subtitle">colecionando momentos</div>
        </div>

        <div class="form-card">
            <label>NOME DO EVENTO</label>
            <input type="text" id="event-name" placeholder="Ex: Formatura 2026">
            
            <label>TEMPO DE GRAVAÇÃO</label>
            <select id="event-time">
                <option value="8">8 Segundos</option>
                <option value="10">10 Segundos</option>
            </select>

            <label>MOLDURA (1080x1920 PNG)</label>
            <input type="file" id="event-frame" accept="image/png">

            <button class="btn-main" onclick="salvarEvento()">SALVAR EVENTO</button>
            <button class="btn-main" style="background:#333" onclick="nav('screen-home')">CANCELAR</button>
        </div>
    </div>

    <div id="screen-camera" class="screen">
        <div class="brand-header">
            <h1 class="neon-title" id="cam-event-title">EVENTO</h1>
            <div class="subtitle">Ajuste o foco e grave</div>
        </div>

        <div class="viewport-9-16">
            <video id="video-preview" autoplay playsinline muted></video>
            <div id="overlay-camera"></div>
        </div>

        <div id="timer" style="font-size: 2rem; margin: 10px; color: var(--neon-purple);">00s</div>
        
        <button class="btn-main" id="btn-rec" onclick="iniciarCaptura()">GRAVAR AGORA</button>
        <button class="btn-main" style="background:#333" onclick="nav('screen-home')">SAIR DO EVENTO</button>
    </div>

<script>
    let eventos = [];
    let eventoAtivo = null;
    let mediaRecorder;
    let chunks = [];

    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function salvarEvento() {
        const nome = document.getElementById('event-name').value;
        const tempo = document.getElementById('event-time').value;
        const frameFile = document.getElementById('event-frame').files[0];

        if(!nome || !frameFile) return alert("Preencha o nome e selecione a moldura!");

        const novoEvento = {
            id: Date.now(),
            nome: nome,
            tempo: tempo,
            molduraUrl: URL.createObjectURL(frameFile)
        };

        eventos.push(novoEvento);
        renderizarEventos();
        nav('screen-home');
        
        // Limpa campos
        document.getElementById('event-name').value = "";
    }

    function renderizarEventos() {
        const container = document.getElementById('lista-eventos');
        if(eventos.length === 0) return;

        container.innerHTML = eventos.map(ev => `
            <div class="event-item">
                <div>
                    <strong>${ev.nome}</strong><br>
                    <small style="color:#888">${ev.tempo}s | Ativo</small>
                </div>
                <button class="btn-main" style="width:100px; margin:0; font-size:12px;" onclick="abrirEvento(${ev.id})">ABRIR</button>
            </div>
        `).join('');
    }

    async function abrirEvento(id) {
        eventoAtivo = eventos.find(e => e.id === id);
        document.getElementById('cam-event-title').innerText = eventoAtivo.nome;
        document.getElementById('overlay-camera').style.backgroundImage = `url(${eventoAtivo.molduraUrl})`;
        
        nav('screen-camera');

        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } }
            });
            document.getElementById('video-preview').srcObject = stream;
            window.currentStream = stream;
        } catch (e) { alert("Erro ao acessar câmera."); }
    }

    function iniciarCaptura() {
        chunks = [];
        const btn = document.getElementById('btn-rec');
        mediaRecorder = new MediaRecorder(window.currentStream);
        
        mediaRecorder.ondataavailable = e => chunks.push(e.data);
        mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            alert("Vídeo pronto! ID Temporário Gerado.");
            // Aqui entraria o código de upload para o R2 que fizemos antes
        };

        mediaRecorder.start();
        btn.disabled = true;
        btn.innerText = "GRAVANDO...";

        let timeLeft = parseInt(eventoAtivo.tempo);
        let timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft.toString().padStart(2, '0') + "s";
            if(timeLeft <= 0) {
                clearInterval(timer);
                mediaRecorder.stop();
                btn.disabled = false;
                btn.innerText = "GRAVAR AGORA";
                document.getElementById('timer').innerText = "00s";
            }
        }, 1000);
    }
</script>
</body>
</html>
