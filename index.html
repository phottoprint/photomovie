<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin - Photo Movie</title>
    <style>
        body { font-family: sans-serif; background: #111; color: #eee; padding: 20px; }
        .card { background: #222; padding: 20px; border-radius: 10px; border: 1px solid #333; margin-bottom: 20px; }
        input, select, button { padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #444; }
        input { width: 100%; box-sizing: border-box; background: #333; color: #fff; }
        button { background: #00d1d1; color: #000; font-weight: bold; cursor: pointer; border: none; }
        button.btn-del { background: #ff4444; color: #fff; margin-left: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        .flex { display: flex; gap: 10px; align-items: center; }
        .label-group { margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Configurar Novo Evento</h2>
        
        <div class="label-group">
            <label>Nome do Evento:</label>
            <input type="text" id="ev-nome" placeholder="Ex: Casamento de Joao">
        </div>

        <div class="label-group">
            <label>Data do Evento:</label>
            <input type="date" id="ev-data">
        </div>

        <div class="label-group">
            <label>Tempo de Gravação (Segundos):</label>
            <input type="number" id="ev-tempo" value="10" min="5" max="60">
        </div>

        <div class="label-group">
            <label>Subir Moldura (PNG):</label>
            <input type="file" id="ev-moldura" accept="image/png">
        </div>

        <div class="label-group">
            <label>Subir Música (MP3):</label>
            <input type="file" id="ev-musica" accept="audio/mpeg">
        </div>

        <button onclick="salvarEvento()">CRIAR / SALVAR EVENTO</button>
    </div>

    <div class="card">
        <h2>Eventos Ativos</h2>
        <table id="tabela-eventos">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Data</th>
                    <th>Tempo</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

<script>
    const WORKER_URL = "https://photomovie.maxprimefotovideo.workers.dev";

    async function listarEventos() {
        const res = await fetch(`${WORKER_URL}/listar-eventos`);
        const dados = await res.json();
        const corpo = document.querySelector("#tabela-eventos tbody");
        corpo.innerHTML = "";

        dados.forEach(ev => {
            corpo.innerHTML += `
                <tr>
                    <td>${ev.nome}</td>
                    <td>${ev.data}</td>
                    <td>${ev.tempo}s</td>
                    <td>
                        <button onclick="abrirEvento('${ev.id}', '${ev.nome}', '${ev.tempo}', '${ev.molduraUrl}', '${ev.musicaUrl}')">ABRIR</button>
                        <button class="btn-del" onclick="excluirEvento('${ev.id}', '${ev.nome}')">EXCLUIR</button>
                    </td>
                </tr>
            `;
        });
    }

    async function salvarEvento() {
        const nome = document.getElementById('ev-nome').value;
        const data = document.getElementById('ev-data').value;
        const tempo = document.getElementById('ev-tempo').value;
        const molduraFile = document.getElementById('ev-moldura').files[0];
        const musicaFile = document.getElementById('ev-musica').files[0];

        if (!nome) return alert("Digite o nome do evento!");

        const nomeLimpo = nome.replace(/\s+/g, '_');
        let molduraUrl = "";
        let musicaUrl = "";

        // Upload da Moldura
        if (molduraFile) {
            const fd = new FormData();
            fd.append("file", molduraFile);
            fd.append("uuid", "moldura.png");
            fd.append("evento", nomeLimpo);
            const res = await fetch(`${WORKER_URL}/upload`, { method: "POST", body: fd });
            const d = await res.json();
            molduraUrl = d.path;
        }

        // Upload da Música
        if (musicaFile) {
            const fd = new FormData();
            fd.append("file", musicaFile);
            fd.append("uuid", "musica.mp3");
            fd.append("evento", nomeLimpo);
            const res = await fetch(`${WORKER_URL}/upload`, { method: "POST", body: fd });
            const d = await res.json();
            musicaUrl = d.path;
        }

        const payload = {
            id: Date.now().toString(),
            nome: nomeLimpo,
            data: data,
            tempo: tempo,
            molduraUrl: molduraUrl,
            musicaUrl: musicaUrl
        };

        await fetch(`${WORKER_URL}/salvar-evento`, {
            method: "POST",
            body: JSON.stringify(payload)
        });

        alert("Evento Salvo!");
        listarEventos();
    }

    function abrirEvento(id, nome, tempo, moldura, musica) {
        const config = { id, nome, tempo, moldura, musica };
        localStorage.setItem('config_atual', JSON.stringify(config));
        window.location.href = "camera.html";
    }

    async function excluirEvento(id, nome) {
        if (!confirm(`Excluir evento ${nome}?`)) return;
        try {
            const res = await fetch(`${WORKER_URL}/excluir-evento?id=${id}&evento=${nome}`);
            if(res.ok) {
                alert("Excluído com sucesso!");
                listarEventos();
            } else {
                alert("Erro ao excluir.");
            }
        } catch (e) {
            alert("Erro de conexão.");
        }
    }

    window.onload = listarEventos;
</script>
</body>
</html>
