<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHOTO MOVIE - Pro v4</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { 
            --neon-purple: #9200ff; 
            --neon-orange: #ff8c00;
            --neon-red: #ff0000;
            --dark-bg: #000; 
        }
        
        body { margin: 0; background: var(--dark-bg); font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; }
        .screen { display: none; min-height: 100vh; width: 100vw; flex-direction: column; align-items: center; position: absolute; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }

        /* 1. TÍTULO NO ALTO */
        .brand-top { text-align: center; margin-top: 50px; }
        .neon-title { 
            font-size: 3.2rem; font-weight: 900; color: var(--neon-purple);
            text-shadow: 0 0 15px var(--neon-purple); animation: pulse 1.5s infinite alternate; margin: 0;
        }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.03); } }

        /* 2. BOTÃO INICIAR NO MEIO */
        .home-center { flex: 1; display: flex; align-items: center; justify-content: center; }

        /* BOTOES */
        .btn-main { 
            background: var(--neon-purple); color: white; border: none; padding: 18px 40px; 
            border-radius: 40px; font-weight: bold; cursor: pointer; text-transform: uppercase; 
            box-shadow: 0 0 15px var(--neon-purple); width: 280px; margin: 10px 0;
        }

        /* 4. LAYOUT NOVO EVENTO COMPLETO */
        .form-card { background: #111; width: 95%; max-width: 450px; padding: 20px; border-radius: 20px; border: 1px solid #333; overflow-y: auto; max-height: 70vh; }
        label { display: block; margin: 12px 0 5px; color: var(--neon-purple); font-weight: bold; font-size: 11px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: white; border-radius: 10px; box-sizing: border-box; }
        .grid-effects { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .opt-effect { background: #222; padding: 10px; border-radius: 8px; font-size: 11px; text-align: center; border: 1px solid #444; cursor: pointer; }
        .opt-effect.selected { border-color: var(--neon-purple); background: #300050; box-shadow: 0 0 10px var(--neon-purple); }

        /* 5. VOLTAR MAIS PARA CIMA */
        .footer-nav { margin-top: 20px; margin-bottom: 40px; width: 100%; display: flex; justify-content: center; }

        /* 6. SETA DE VOLTAR NA CÂMERA */
        .cam-controls { position: absolute; bottom: 60px; width: 90%; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        .back-arrow-btn { 
            width: 45px; height: 45px; border: 2px solid var(--neon-purple); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            animation: arrow-glow 1s infinite alternate;
        }
        @keyframes arrow-glow { from { box-shadow: 0 0 2px var(--neon-purple); } to { box-shadow: 0 0 15px var(--neon-purple); } }

        /* 7. AVISOS DE GRAVAÇÃO */
        #finish-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .warning-text { font-size: 2.5rem; font-weight: 900; text-align: center; }
        .pulsing-red { animation: blink-red 0.3s infinite; }
        @keyframes blink-red { 0% { opacity: 1; } 50% { opacity: 0; } }

        /* CÂMERA E OBTURADOR */
        #video-preview { width: 100vw; height: 100vh; object-fit: cover; }
        .shutter-btn { width: 75px; height: 75px; border: 5px solid white; border-radius: 50%; box-shadow: 0 0 20px var(--neon-purple); cursor: pointer; }

        /* GALERIA */
        .gallery-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; padding-bottom: 120px; overflow-y: auto; }
        .video-card { aspect-ratio: 9/16; background: #111; border-radius: 10px; overflow: hidden; position: relative; border: 1px solid #333; }
        
        /* MODAL */
        #modal-movie { position: fixed; inset: 0; background: #000; z-index: 500; display: none; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="screen-home" class="screen active">
        <div class="brand-top">
            <h1 class="neon-title">PHOTO MOVIE</h1>
            <div style="letter-spacing: 5px; font-size: 0.9rem;">COLECIONANDO MOMENTOS</div>
        </div>
        <div class="home-center">
            <button class="btn-main" onclick="nav('screen-menu')">INICIAR</button>
        </div>
    </div>

    <div id="screen-menu" class="screen">
        <h2 style="color:var(--neon-purple); margin-top: 40px;">GERENCIAR</h2>
        <button class="btn-main" style="background:white; color:black" onclick="nav('screen-config')">+ NOVO EVENTO</button>
        <div id="lista-eventos" style="width:100%; max-width:400px; margin-top: 20px;"></div>
        <div class="footer-nav">
            <button class="btn-main" style="background:#222; width: 220px;" onclick="nav('screen-home')">VOLTAR</button>
        </div>
    </div>

    <div id="screen-config" class="screen">
        <div class="form-card">
            <label>NOME DO EVENTO</label>
            <input type="text" id="cfg-nome">
            
            <label>DATA</label>
            <input type="date" id="cfg-data">

            <label>VELOCIDADE / EFEITO</label>
            <div class="grid-effects">
                <div class="opt-effect" onclick="selEff(this, '0.5')">SLOW (0.5x)</div>
                <div class="opt-effect selected" onclick="selEff(this, '1.0')">NORMAL (1.0x)</div>
                <div class="opt-effect" onclick="selEff(this, '2.0')">FAST (2.0x)</div>
            </div>

            <label>MOLDURA (.PNG)</label>
            <input type="file" id="cfg-frame" accept="image/png" onchange="previewMoldura(this)">
            <div id="prev-box" style="width:80px; height:140px; border:1px solid var(--neon-purple); margin: 10px auto; background-size: contain; background-repeat: no-repeat; display:none"></div>

            <label>ADICIONAR MÚSICA</label>
            <input type="file" accept="audio/*">

            <button class="btn-main" style="width:100%; margin-top: 20px;" onclick="salvarEvento()">CRIAR EVENTO</button>
        </div>
        <div class="footer-nav">
            <button class="btn-main" style="background:#222; width: 220px;" onclick="nav('screen-menu')">VOLTAR</button>
        </div>
    </div>

    <div id="screen-camera" class="screen" style="padding:0">
        <video id="video-preview" autoplay playsinline muted></video>
        <div id="timer" style="position:absolute; top:40px; font-size:2.5rem; font-weight:bold; text-shadow: 0 0 10px #000;">00s</div>
        
        <div class="cam-controls">
            <div class="back-arrow-btn" onclick="nav('screen-menu')">
                <span style="color:var(--neon-purple); font-weight:bold; font-size:20px">❮</span>
            </div>
            <div class="shutter-btn" onclick="startRec()"></div>
            <div style="width:45px"></div> </div>

        <div id="finish-overlay">
            <div id="warning-msg" class="warning-text">FINALIZANDO...</div>
            <button id="btn-ok-cam" class="btn-main" style="display:none; margin-top:40px" onclick="nav('screen-gallery')">VER GALERIA</button>
        </div>
    </div>

    <div id="screen-gallery" class="screen">
        <h2 style="color:var(--neon-purple); margin-top: 40px;">GALERIA DO EVENTO</h2>
        <div id="gallery-container" class="gallery-grid"></div>
        <div class="footer-nav" style="margin-top: -80px;">
            <button class="btn-main" style="background:#222; width: 220px;" onclick="nav('screen-menu')">VOLTAR</button>
        </div>
    </div>

    <div id="modal-movie">
        <video id="modal-player" style="width:80%; max-width:300px; border:2px solid var(--neon-purple)" controls></video>
        <div id="qrcode-box" style="background:white; padding:10px; margin:20px 0; border-radius:10px"></div>
        <a id="download-link" class="btn-main" style="text-align:center; text-decoration:none; display:block; line-height:50px">BAIXAR VÍDEO</a>
        <button class="btn-main" style="background:#333" onclick="document.getElementById('modal-movie').style.display='none'">FECHAR</button>
    </div>

<script>
    let db;
    let activeEvId = null;
    let selectedSpeed = '1.0';
    const req = indexedDB.open("PhotoMovieDB", 1);

    req.onupgradeneeded = e => {
        db = e.target.result;
        db.createObjectStore("eventos", { keyPath: "id" });
        db.createObjectStore("movies", { keyPath: "id", autoIncrement: true }).createIndex("evId", "evId");
    };

    req.onsuccess = e => { db = e.target.result; renderEventos(); };

    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'screen-camera') startCamera();
        if(id === 'screen-gallery') renderGallery();
    }

    function selEff(el, val) {
        document.querySelectorAll('.opt-effect').forEach(o => o.classList.remove('selected'));
        el.classList.add('selected'); selectedSpeed = val;
    }

    function previewMoldura(i) {
        if(i.files[0]) {
            const url = URL.createObjectURL(i.files[0]);
            const box = document.getElementById('prev-box');
            box.style.backgroundImage = `url(${url})`; box.style.display = 'block';
            window.tempFrame = url;
        }
    }

    function salvarEvento() {
        const nome = document.getElementById('cfg-nome').value;
        if(!nome || !window.tempFrame) return alert("Nome e Moldura são necessários!");
        
        const evento = { id: Date.now(), nome, frame: window.tempFrame, speed: selectedSpeed };
        db.transaction("eventos", "readwrite").objectStore("eventos").add(evento).onsuccess = () => {
            renderEventos(); nav('screen-menu');
        };
    }

    function renderEventos() {
        const list = document.getElementById('lista-eventos');
        list.innerHTML = "";
        db.transaction("eventos", "readonly").objectStore("eventos").getAll().onsuccess = e => {
            e.target.result.forEach(ev => {
                list.innerHTML += `
                    <div style="background:#111; padding:15px; border-radius:15px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; border:1px solid #333">
                        <span>${ev.nome}</span>
                        <button onclick="abrirEvento(${ev.id})" style="background:var(--neon-purple); border:none; color:white; padding:8px 15px; border-radius:10px; font-weight:bold">ABRIR</button>
                    </div>`;
            });
        };
    }

    function abrirEvento(id) {
        activeEvId = id;
        db.transaction("eventos", "readonly").objectStore("eventos").get(id).onsuccess = e => {
            window.activeFrame = e.target.result.frame;
            nav('screen-camera');
        };
    }

    async function startCamera() {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1280 } });
        document.getElementById('video-preview').srcObject = s;
        window.stream = s;
    }

    function startRec() {
        const chunks = [];
        const rec = new MediaRecorder(window.stream);
        rec.ondataavailable = e => chunks.push(e.data);
        rec.onstop = () => {
            const reader = new FileReader();
            reader.onload = e => {
                db.transaction("movies", "readwrite").objectStore("movies").add({ evId: activeEvId, video: e.target.result });
            };
            reader.readAsDataURL(new Blob(chunks));
        };
        rec.start();

        let t = 10;
        const overlay = document.getElementById('finish-overlay');
        const msg = document.getElementById('warning-msg');
        overlay.style.display = 'flex';
        msg.innerText = "GRAVANDO..."; msg.style.color = "white";

        let intv = setInterval(() => {
            t--;
            document.getElementById('timer').innerText = t.toString().padStart(2,'0')+"s";
            if(t <= 3 && t > 0) { msg.innerText = "FINALIZANDO..."; msg.style.color = "var(--neon-orange)"; }
            if(t <= 0) {
                clearInterval(intv); rec.stop();
                msg.innerText = "FINALIZOU!"; msg.classList.add('pulsing-red'); msg.style.color = "var(--neon-red)";
                document.getElementById('btn-ok-cam').style.display = 'block';
            }
        }, 1000);
    }

    function renderGallery() {
        const cont = document.getElementById('gallery-container');
        cont.innerHTML = "";
        db.transaction("movies", "readonly").objectStore("movies").index("evId").openCursor(IDBKeyRange.only(activeEvId)).onsuccess = e => {
            const cursor = e.target.result;
            if (cursor) {
                cont.innerHTML += `
                    <div class="video-card" onclick="abrirModal('${cursor.value.video}')">
                        <video src="${cursor.value.video}" style="width:100%"></video>
                        <img src="${window.activeFrame}" style="position:absolute; inset:0; width:100%">
                    </div>`;
                cursor.continue();
            }
        };
    }

    function abrirModal(url) {
        const modal = document.getElementById('modal-movie');
        const player = document.getElementById('modal-player');
        modal.style.display = 'flex';
        player.src = url;
        
        document.getElementById('qrcode-box').innerHTML = "";
        new QRCode(document.getElementById("qrcode-box"), { text: url, width: 128, height: 128 });
        
        const dl = document.getElementById('download-link');
        dl.href = url; dl.download = 'movie.mp4';
    }
</script>
</body>
</html>
