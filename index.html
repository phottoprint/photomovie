<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CENTRAL - Photo Movie</title>
    <style>
        :root { 
            --turquesa: #00d1d1; 
            --turquesa-dark: #003333; 
            --dourado: #c5a059;      
            --bg-card: rgba(0, 40, 40, 0.6);
            --danger: #ff5555;
        }
        
        body { 
            margin: 0; background: var(--turquesa-dark); color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .header { margin-top: 1.5cm; text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--dourado); font-size: 48px; font-weight: 900; margin: 0; text-transform: uppercase; }

        .main-container { width: 95%; max-width: 500px; } /* 1. Aumentado conforme pedido */

        .btn-central {
            width: 100%; padding: 18px; margin: 8px 0; border-radius: 12px;
            text-transform: uppercase; font-weight: 800; font-size: 14px;
            cursor: pointer; text-decoration: none; text-align: center;
            display: none; box-sizing: border-box; transition: 0.3s;
        }

        .btn-create { background: linear-gradient(135deg, var(--dourado), #8e6d2d); color: #1a1a1a; border: none; }
        #btn-galeria { background: rgba(197, 160, 89, 0.05); color: var(--dourado); border: 1px solid var(--dourado); }
        #btn-login { display: block; background: transparent; color: var(--dourado); border: 2px solid var(--dourado); margin-top: 50px; }

        /* 2. Modal do Evento (Card) com a Cor do Sistema */
        .event-card {
            background: var(--bg-card); 
            border: 1px solid rgba(0, 209, 209, 0.3); /* Turquesa do sistema */
            padding: 22px; border-radius: 18px; margin-bottom: 15px; position: relative;
            transition: 0.3s;
        }
        
        /* 3. Estilo do Card quando Ativo */
        .event-card.active { border: 2px solid var(--turquesa); box-shadow: 0 0 15px rgba(0, 209, 209, 0.2); }
        .status-badge { 
            position: absolute; top: 12px; right: 12px; font-size: 10px; 
            background: var(--turquesa); color: #000; padding: 3px 10px; border-radius: 20px; 
            display: none; font-weight: 900;
        }
        .event-card.active .status-badge { display: block; }

        .event-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; cursor: pointer; }
        .event-info h4 { margin: 0; color: var(--turquesa); text-transform: uppercase; font-size: 18px; }
        .event-info span { font-size: 12px; color: #aaa; }

        .event-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .btn-mini { padding: 10px 2px; border-radius: 8px; font-size: 11px; font-weight: bold; border: none; cursor: pointer; text-transform: uppercase; }
        
        /* Botão Ativar Dinâmico */
        .btn-activate { background: transparent; color: var(--turquesa); border: 1px solid var(--turquesa); }
        .event-card.active .btn-activate { background: var(--turquesa); color: #000; }

        .btn-edit { background: #444; color: #fff; }
        .btn-delete { background: rgba(255, 85, 85, 0.1); color: var(--danger); border: 1px solid var(--danger); }

        #modal-senha { position: fixed; inset: 0; background: rgba(0,20,20,0.98); display: none; align-items: center; justify-content: center; z-index: 9999; backdrop-filter: blur(15px); }
        .modal-content { background: #002222; padding: 35px; border-radius: 25px; border: 1px solid var(--dourado); text-align: center; width: 85%; max-width: 320px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>PHOTO MOVIE</h1>
        <p>central de eventos</p>
    </div>

    <div class="main-container">
        <button id="btn-login" class="btn-central" onclick="abrirModal()">🔓 ACESSAR SISTEMA</button>
        <a href="config_evento.html" id="btn-create" class="btn-protected btn-central btn-create">➕ CRIAR NOVO EVENTO</a>
        <button id="btn-galeria" class="btn-protected btn-central" onclick="irParaGaleria()">🎞️ ACESSAR GALERIA</button>
        
        <div id="container-eventos" class="event-list-container">
            <div id="lista-eventos"></div>
        </div>

        <button id="btn-lock" class="btn-protected btn-central" onclick="bloquear()" style="background: transparent; color: var(--danger); border: 1px solid rgba(255,85,85,0.2); margin-top: 30px; font-size: 11px;">SAIR</button>
    </div>

<script>
    const WORKER_URL = "https://photomovie.maxprimefotovideo.workers.dev"; 

    window.onload = () => {
        if(sessionStorage.getItem('logado') === 'true') liberarSistema();
    }

    function liberarSistema() {
        document.getElementById('btn-login').style.display = 'none';
        document.querySelectorAll('.btn-protected').forEach(b => b.style.display = 'block');
        renderEventos();
    }

    async function renderEventos() {
        const container = document.getElementById('lista-eventos');
        container.innerHTML = '<p style="text-align:center; color:var(--turquesa);">Sincronizando...</p>';

        try {
            const res = await fetch(`${WORKER_URL}/listar-eventos`);
            const eventos = await res.json();
            
            // Pega o ID do evento que foi ativado por último
            const ativoRaw = localStorage.getItem('evento_ativo');
            const eventoAtivoID = ativoRaw ? JSON.parse(ativoRaw).id : null;

            container.innerHTML = '';
            eventos.forEach((ev) => {
                const isActive = String(ev.id) === String(eventoAtivoID);
                // Serialização segura para o botão editar
                const evDataStr = btoa(encodeURIComponent(JSON.stringify(ev)));

                container.innerHTML += `
                    <div class="event-card ${isActive ? 'active' : ''}">
                        <div class="status-badge">ATIVO NO SISTEMA</div>
                        <div class="event-header" onclick="acessarCamera('${ev.id}')">
                            <div class="event-info">
                                <h4>${ev.nome}</h4>
                                <span>📅 ${ev.data || 'Sem data'}</span>
                            </div>
                            <span style="font-size:24px;">📸</span>
                        </div>
                        <div class="event-actions">
                            <button class="btn-mini btn-activate" onclick="setAtivo('${ev.id}', '${ev.nome}')">
                                ${isActive ? 'EM USO' : 'ATIVAR'}
                            </button>
                            <button class="btn-mini btn-edit" onclick="editarEvento('${evDataStr}')">EDITAR</button>
                            <button class="btn-mini btn-delete" onclick="excluirEvento('${ev.id}', '${ev.nome}')">EXCLUIR</button>
                        </div>
                    </div>`;
            });
        } catch (e) { container.innerHTML = '<p>Erro ao carregar.</p>'; }
    }

    // 4. CORREÇÃO DO ATIVAR: Agora força o salvamento e recarrega a lista
    function setAtivo(id, nome) {
        const obj = { id: String(id), nome: nome };
        localStorage.setItem('evento_ativo', JSON.stringify(obj));
        localStorage.setItem('evento_selecionado', JSON.stringify(obj)); // Para compatibilidade com a galeria
        renderEventos(); // Atualiza os botões na hora
    }

    function irParaGaleria() {
        if(!localStorage.getItem('evento_ativo')) return alert("Ative um evento primeiro!");
        window.location.href = 'galeria.html';
    }

    // 5. CORREÇÃO DO EDITAR: Envia o objeto limpo
    function editarEvento(evDataStr) {
        const ev = JSON.parse(decodeURIComponent(atob(evDataStr)));
        localStorage.setItem('evento_para_editar', JSON.stringify(ev));
        window.location.href = 'config_evento.html';
    }

    async function acessarCamera(id) {
        const res = await fetch(`${WORKER_URL}/listar-eventos`);
        const eventos = await res.json();
        const config = eventos.find(e => String(e.id) === String(id));
        if(config) {
            localStorage.setItem('config_atual', JSON.stringify(config));
            window.location.href = 'camera.html';
        }
    }

    async function excluirEvento(id, nome) {
        if(!confirm(`Excluir permanentemente "${nome}"?`)) return;
        await fetch(`${WORKER_URL}/excluir-evento?id=${id}&evento=${encodeURIComponent(nome)}`, { method: 'DELETE' });
        renderEventos();
    }

    // Funções de Modal (Sua lógica de senha original)
    function abrirModal() { document.getElementById('modal-senha').style.display = 'flex'; }
    function fecharModal() { document.getElementById('modal-senha').style.display = 'none'; }
    function validarSenha() { 
        if (document.getElementById('input-senha').value === "1234") { 
            sessionStorage.setItem('logado', 'true'); fecharModal(); liberarSistema(); 
        } 
    }
    function bloquear() { sessionStorage.removeItem('logado'); location.reload(); }
</script>
</body>
</html>
