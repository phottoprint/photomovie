<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHOTO MOVIE - Ultimate</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { 
            --neon-purple: #9200ff; 
            --neon-orange: #ff8c00;
            --neon-red: #ff0000;
            --dark-bg: #000; 
        }
        
        body { margin: 0; background: var(--dark-bg); font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; }
        .screen { display: none; min-height: 100vh; width: 100vw; flex-direction: column; align-items: center; position: absolute; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }

        .neon-title { font-size: 3.2rem; font-weight: 900; color: var(--neon-purple); text-shadow: 0 0 15px var(--neon-purple); margin: 0; }
        .btn-main { background: var(--neon-purple); color: white; border: none; padding: 18px 40px; border-radius: 40px; font-weight: bold; cursor: pointer; text-transform: uppercase; box-shadow: 0 0 15px var(--neon-purple); width: 280px; margin: 10px 0; }
        
        /* BOTÃO VOLTAR RODAPÉ */
        .footer-nav { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: center; }

        /* EVENTOS */
        .event-card { background: #111; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; width: 100%; max-width: 400px; box-sizing: border-box; }
        .btn-del { background: #300; color: #f00; border: 1px solid #600; padding: 8px; border-radius: 8px; cursor: pointer; margin-left: 10px; }

        /* CÂMERA */
        #video-preview { width: 100vw; height: 100vh; object-fit: cover; }
        .cam-controls { position: absolute; bottom: 60px; width: 90%; display: flex; align-items: center; justify-content: space-between; }
        .shutter-btn { width: 75px; height: 75px; border: 5px solid white; border-radius: 50%; box-shadow: 0 0 20px var(--neon-purple); }

        /* AVISOS */
        #finish-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .warning-text { font-size: 3rem; font-weight: 900; }
        .pulsing { animation: pulse-red 0.4s infinite; color: var(--neon-red); }
        @keyframes pulse-red { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.1); } 100% { opacity: 1; transform: scale(1); } }

        /* GALERIA */
        .gallery-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; padding-bottom: 150px; overflow-y: auto; }
        .video-card { aspect-ratio: 9/16; background: #111; border-radius: 10px; overflow: hidden; position: relative; border: 1px solid #333; }
        .card-btns { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.7); display: flex; flex-direction: column; padding: 5px; gap: 5px; box-sizing: border-box; }
        .btn-small { background: #333; color: white; border: none; font-size: 10px; padding: 4px; border-radius: 4px; }
        .btn-qr { background: var(--neon-purple); color: white; border: none; font-weight: bold; font-size: 12px; padding: 8px; border-radius: 6px; }

        /* MODAL QR */
        #modal-qr { position: fixed; inset: 0; background: #000; z-index: 500; display: none; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="screen-home" class="screen active" style="justify-content: center;">
        <h1 class="neon-title">PHOTO MOVIE</h1>
        <button class="btn-main" onclick="nav('screen-menu')">INICIAR</button>
    </div>

    <div id="screen-menu" class="screen">
        <h2 style="color:var(--neon-purple)">GERENCIAR</h2>
        <button class="btn-main" style="background:#fff; color:#000" onclick="nav('screen-config')">+ NOVO EVENTO</button>
        <div id="lista-eventos" style="width:100%; display:flex; flex-direction:column; align-items:center;"></div>
        <div class="footer-nav">
            <button class="btn-main" style="background:#222" onclick="nav('screen-home')">VOLTAR</button>
        </div>
    </div>

    <div id="screen-config" class="screen">
        <h2 style="color:var(--neon-purple)">CONFIGURAR</h2>
        <input type="text" id="cfg-nome" placeholder="NOME DO EVENTO" style="width:280px; padding:15px; background:#111; border:1px solid #333; color:white; margin-bottom:10px; border-radius:10px">
        <input type="file" id="cfg-frame" accept="image/png">
        <button class="btn-main" onclick="salvarEvento()">SALVAR EVENTO</button>
        <div class="footer-nav">
            <button class="btn-main" style="background:#222" onclick="nav('screen-menu')">VOLTAR</button>
        </div>
    </div>

    <div id="screen-camera" class="screen" style="padding:0">
        <video id="video-preview" autoplay playsinline muted></video>
        <div class="cam-controls">
            <div onclick="nav('screen-menu')" style="color:var(--neon-purple); font-size:30px; padding:20px;">❮</div>
            <div class="shutter-btn" onclick="startRec()"></div>
            <div style="width:50px"></div>
        </div>
        <div id="finish-overlay">
            <div id="warning-msg" class="warning-text"></div>
            <button id="btn-ok-cam" class="btn-main" style="display:none; margin-top:40px" onclick="nav('screen-gallery')">OK / VER VÍDEOS</button>
        </div>
    </div>

    <div id="screen-gallery" class="screen">
        <h2 style="color:var(--neon-purple)">GALERIA</h2>
        <div id="gallery-container" class="gallery-grid"></div>
        <div class="footer-nav">
            <button class="btn-main" style="background:#222" onclick="nav('screen-menu')">VOLTAR</button>
        </div>
    </div>

    <div id="modal-qr">
        <div id="qrcode-box" style="background:white; padding:15px; border-radius:15px"></div>
        <h3 style="margin-top:20px">QR CODE DO VÍDEO</h3>
        <button class="btn-main" onclick="document.getElementById('modal-qr').style.display='none'">FECHAR</button>
    </div>

<script>
    let db;
    let activeEvId = null;
    const req = indexedDB.open("PhotoMovieDB", 1);

    req.onupgradeneeded = e => {
        db = e.target.result;
        db.createObjectStore("eventos", { keyPath: "id" });
        db.createObjectStore("movies", { keyPath: "id", autoIncrement: true }).createIndex("evId", "evId");
    };

    req.onsuccess = e => { db = e.target.result; renderEventos(); };

    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'screen-camera') startCamera();
        if(id === 'screen-gallery') renderGallery();
    }

    function salvarEvento() {
        const nome = document.getElementById('cfg-nome').value;
        const file = document.getElementById('cfg-frame').files[0];
        if(!nome || !file) return alert("Preencha tudo!");

        const reader = new FileReader();
        reader.onload = e => {
            const ev = { id: Date.now(), nome, frame: e.target.result };
            db.transaction("eventos", "readwrite").objectStore("eventos").add(ev).onsuccess = () => {
                renderEventos(); nav('screen-menu');
            };
        };
        reader.readAsDataURL(file);
    }

    function renderEventos() {
        const list = document.getElementById('lista-eventos');
        list.innerHTML = "";
        db.transaction("eventos", "readonly").objectStore("eventos").getAll().onsuccess = e => {
            e.target.result.forEach(ev => {
                list.innerHTML += `
                    <div class="event-card">
                        <span>${ev.nome}</span>
                        <div>
                            <button onclick="activeEvId=${ev.id}; window.activeFrame='${ev.frame}'; nav('screen-camera')" style="background:var(--neon-purple); border:none; color:white; padding:8px 12px; border-radius:8px">ABRIR</button>
                            <button class="btn-del" onclick="deletarEvento(${ev.id})">🗑️</button>
                        </div>
                    </div>`;
            });
        };
    }

    function deletarEvento(id) {
        if(confirm("Excluir evento e todos os vídeos?")) {
            db.transaction("eventos", "readwrite").objectStore("eventos").delete(id).onsuccess = () => {
                const mStore = db.transaction("movies", "readwrite").objectStore("movies");
                mStore.index("evId").openCursor(IDBKeyRange.only(id)).onsuccess = ev => {
                    const cursor = ev.target.result;
                    if(cursor) { mStore.delete(cursor.primaryKey); cursor.continue(); }
                };
                renderEventos();
            };
        }
    }

    async function startCamera() {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1280 } });
        document.getElementById('video-preview').srcObject = s;
        window.stream = s;
    }

    function startRec() {
        const chunks = [];
        const rec = new MediaRecorder(window.stream);
        rec.ondataavailable = e => chunks.push(e.data);
        rec.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/mp4' });
            const reader = new FileReader();
            reader.onload = e => {
                db.transaction("movies", "readwrite").objectStore("movies").add({ evId: activeEvId, video: e.target.result });
            };
            reader.readAsDataURL(blob);
        };
        rec.start();

        let t = 10;
        const overlay = document.getElementById('finish-overlay');
        const msg = document.getElementById('warning-msg');
        overlay.style.display = 'flex';
        msg.innerText = ""; // Inicia sem aviso (Branco removido)

        let intv = setInterval(() => {
            t--;
            if(t <= 3 && t > 0) { msg.innerText = "FINALIZANDO..."; msg.style.color = "var(--neon-orange)"; }
            if(t <= 0) {
                clearInterval(intv); rec.stop();
                msg.innerText = "FINALIZOU!"; msg.className = "warning-text pulsing";
                document.getElementById('btn-ok-cam').style.display = 'block';
            }
        }, 1000);
    }

    function renderGallery() {
        const cont = document.getElementById('gallery-container');
        cont.innerHTML = "";
        db.transaction("movies", "readonly").objectStore("movies").index("evId").openCursor(IDBKeyRange.only(activeEvId)).onsuccess = e => {
            const cursor = e.target.result;
            if (cursor) {
                cont.innerHTML += `
                    <div class="video-card">
                        <video src="${cursor.value.video}" style="width:100%"></video>
                        <img src="${window.activeFrame}" style="position:absolute; inset:0; width:100%; pointer-events:none">
                        <div class="card-btns">
                            <button class="btn-qr" onclick="abrirQR('${cursor.value.video}')">QR CODE</button>
                            <button class="btn-small" onclick="baixar('${cursor.value.video}')">baixar vídeo</button>
                        </div>
                    </div>`;
                cursor.continue();
            }
        };
    }

    function abrirQR(url) {
        document.getElementById('qrcode-box').innerHTML = "";
        new QRCode(document.getElementById('qrcode-box'), { text: url, width: 200, height: 200 });
        document.getElementById('modal-qr').style.display = 'flex';
    }

    function baixar(url) {
        const a = document.createElement('a'); a.href = url; a.download = 'movie.mp4'; a.click();
    }
</script>
</body>
</html>
