<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CENTRAL - Photo Movie</title>
    <style>
        :root { 
            --turquesa-dark: #003333; /* Fundo turquesa escuro */
            --dourado: #c5a059;      /* Dourado sóbrio */
            --bg-modal: rgba(0, 20, 20, 0.98);
        }
        
        body { 
            margin: 0; 
            background: var(--turquesa-dark); 
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 1- Cabeçalho (Título e Subtítulo) */
        .header {
            margin-top: 1.8cm; /* Distância exata do topo */
            text-align: center;
            z-index: 10;
        }

        .header h1 {
            color: var(--dourado);
            font-size: 52px; 
            font-weight: 900;
            letter-spacing: 3px;
            margin: 0;
            text-transform: uppercase;
            animation: pulse-gold 3s infinite ease-in-out;
        }

        .header p {
            color: var(--dourado); 
            font-size: 20px; 
            margin: -5px 0 0 0;
            letter-spacing: 4px;
            font-weight: 300;
            text-transform: lowercase;
            opacity: 0.9;
        }

        /* Animação do Dourado */
        @keyframes pulse-gold {
            0% { text-shadow: 0 0 5px rgba(197, 160, 89, 0.2); transform: scale(1); }
            50% { text-shadow: 0 0 25px rgba(197, 160, 89, 0.7); transform: scale(1.02); }
            100% { text-shadow: 0 0 5px rgba(197, 160, 89, 0.2); transform: scale(1); }
        }

        /* Container principal para centralização horizontal */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 85%;
            max-width: 350px;
            position: relative; /* Necessário para posicionamento absoluto */
        }

        /* 2- Estilo do Botão Dourado (Cápsula) */
        .btn-central {
            padding: 20px;
            border-radius: 50px; /* Estilo Cápsula */
            border: 1px solid var(--dourado);
            background: linear-gradient(135deg, var(--dourado), #8e6d2d);
            color: #1a1a1a;
            font-weight: 800;
            font-size: 15px;
            text-transform: uppercase;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            display: none; 
            transition: all 0.3s ease;
            box-sizing: border-box;
            width: 100%;
        }

        /* AJUSTE DE POSICIONAMENTO DO BOTÃO LOGIN */
        #btn-login {
            display: block; /* Visível inicialmente */
            background: transparent;
            color: var(--dourado);
            border: 2px solid var(--dourado);
            box-shadow: none;
            
            /* Posicionamento Absoluto na área circulada */
            position: absolute;
            top: 55vh; /* 55% da altura da tela (posiciona onde circulou) */
            left: 50%;
            transform: translateX(-50%); /* Garante centralização horizontal */
            z-index: 100;
        }

        #btn-login:active { transform: scale(0.95) translateX(-50%); }

        /* Botões internos (Novo Evento, Galeria, Sair) */
        .btn-protected {
            margin: 12px 0;
            width: 100%;
            /* Estes botões ainda estão posicionados pelo fluxo normal */
        }

        /* Modal de Senha */
        #modal-senha {
            position: fixed;
            inset: 0;
            background: var(--bg-modal);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            backdrop-filter: blur(15px);
        }

        .modal-content {
            background: #002222;
            padding: 35px;
            border-radius: 25px;
            border: 1px solid var(--dourado);
            text-align: center;
            width: 85%;
            max-width: 320px;
        }

        .modal-content input {
            width: 100%;
            padding: 18px;
            background: #000;
            border: 1px solid var(--dourado);
            color: var(--dourado);
            border-radius: 12px;
            text-align: center;
            font-size: 28px;
            letter-spacing: 12px;
            margin-bottom: 25px;
            box-sizing: border-box;
            outline: none;
        }

        .btn-confirm {
            background: var(--dourado);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: 900;
            width: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>PHOTO MOVIE</h1>
        <p>colecionando momentos</p>
    </div>

    <div class="main-container">
        <button id="btn-login" class="btn-central" onclick="abrirModal()">🔓 ACESSAR SISTEMA</button>

        <a href="https://phottoprint.github.io/photomovie/" class="btn-protected btn-central">📸 NOVO EVENTO</a>
        <a href="https://phottoprint.github.io/photomovie/galeria.html" class="btn-protected btn-central">🎞️ ACESSAR GALERIA</a>
        
        <button id="btn-lock" class="btn-protected btn-central" onclick="bloquear()" style="background: transparent; color: #ff5555; border-color: #444; margin-top: 20px; font-size: 12px;">ENCERRAR SESSÃO</button>
    </div>

    <div id="modal-senha">
        <div class="modal-content">
            <h3 style="color:var(--dourado); letter-spacing: 2px;">AUTENTICAÇÃO</h3>
            <input type="password" id="input-senha" inputmode="numeric" pattern="[0-9]*" placeholder="••••">
            <button class="btn-confirm" onclick="validarSenha()">CONFIRMAR</button>
            <p onclick="fecharModal()" style="margin-top:20px; font-size:13px; color:#999; cursor:pointer">Voltar</p>
        </div>
    </div>

<script>
    const SENHA_MESTRA = "1234"; 

    window.onload = () => {
        if(sessionStorage.getItem('logado') === 'true') {
            liberarSistema();
        }
    }

    function abrirModal() {
        document.getElementById('modal-senha').style.display = 'flex';
        document.getElementById('input-senha').focus();
    }

    function fecharModal() {
        document.getElementById('modal-senha').style.display = 'none';
        document.getElementById('input-senha').value = '';
    }

    function validarSenha() {
        const input = document.getElementById('input-senha');
        if (input.value === SENHA_MESTRA) {
            sessionStorage.setItem('logado', 'true');
            fecharModal();
            liberarSistema();
        } else {
            alert("Senha Incorreta");
            input.value = '';
        }
    }

    function liberarSistema() {
        document.getElementById('btn-login').style.display = 'none';
        document.querySelectorAll('.btn-protected').forEach(b => b.style.display = 'block');
    }

    function bloquear() {
        sessionStorage.removeItem('logado');
        location.reload();
    }
</script>
</body>
</html>
