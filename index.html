<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CENTRAL - Photo Movie</title>
    <style>
        :root { 
            --turquesa-dark: #003333; 
            --dourado: #c5a059;      
            --dourado-dark: #8e6d2d;
            --bg-modal: rgba(0, 20, 20, 0.98);
            --cinza-minimal: #666666; 
            --ativo: #28a745;
            --inativo: #ff3b30;
        }
        
        body { 
            margin: 0; background: var(--turquesa-dark); color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        .header { margin-top: 1.8cm; text-align: center; margin-bottom: 40px; }
        .header h1 { color: var(--dourado); font-size: 52px; font-weight: 900; letter-spacing: 3px; margin: 0; text-transform: uppercase; animation: pulse-gold 3s infinite ease-in-out; }
        .header p { color: var(--dourado); font-size: 20px; margin: -5px 0 0 0; letter-spacing: 4px; font-weight: 300; text-transform: lowercase; opacity: 0.9; }

        @keyframes pulse-gold {
            0%, 100% { text-shadow: 0 0 5px rgba(197, 160, 89, 0.2); transform: scale(1); }
            50% { text-shadow: 0 0 25px rgba(197, 160, 89, 0.7); transform: scale(1.02); }
        }

        .main-container { flex: 1; display: flex; flex-direction: column; align-items: center; width: 92%; max-width: 500px; }

        .btn-central {
            width: 100%; padding: 22px; margin: 10px 0; border-radius: 12px;
            text-transform: uppercase; font-weight: 800; font-size: 16px;
            cursor: pointer; text-decoration: none; text-align: center;
            display: none; box-sizing: border-box; transition: all 0.3s ease;
        }

        .btn-create { background: linear-gradient(135deg, var(--dourado), var(--dourado-dark)); color: #1a1a1a; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        #btn-galeria { background: rgba(197, 160, 89, 0.1); color: var(--dourado); border: 1px solid var(--dourado); margin-bottom: 25px; }
        #btn-login { display: block; background: transparent; color: var(--dourado); border: 2px solid var(--dourado); margin-top: 50px; }

        .event-list-container { width: 100%; margin-top: 30px; display: none; }

        /* CARDS E BOTOES MAIORES CONFORME PEDIDO */
        .event-card {
            background: rgba(0,0,0,0.5); border: 2px solid rgba(197, 160, 89, 0.2);
            padding: 25px; border-radius: 20px; margin-bottom: 18px;
            display: flex; flex-direction: column; gap: 15px;
            transition: 0.3s;
        }
        
        .event-card.active-border { border-color: var(--ativo); background: rgba(40, 167, 69, 0.05); }

        .event-info h4 { margin: 0; color: var(--dourado); text-transform: uppercase; font-size: 22px; }
        .event-info span { font-size: 13px; color: #aaa; display: block; margin-top: 6px; }

        .group-actions-row { display: flex; gap: 10px; width: 100%; }

        /* BOTAO DE STATUS GRANDE E FUNCIONAL */
        .status-btn {
            flex: 2; padding: 18px; border-radius: 12px; font-size: 14px; font-weight: 900;
            cursor: pointer; text-transform: uppercase; border: none; transition: 0.3s;
        }
        .btn-is-on { background: var(--ativo); color: white; box-shadow: 0 4px 10px rgba(40, 167, 69, 0.3); }
        .btn-is-off { background: #333; color: #777; }

        .btn-edit-big { flex: 1; background: #444; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-del-big { flex: 0.5; background: rgba(255,59,48,0.2); color: #ff3b30; border: 1px solid #ff3b30; border-radius: 12px; cursor: pointer; font-size: 18px; }

        #modal-senha { position: fixed; inset: 0; background: var(--bg-modal); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; backdrop-filter: blur(15px); }
        .modal-content { background: #002222; padding: 35px; border-radius: 25px; border: 1px solid var(--dourado); text-align: center; width: 85%; max-width: 320px; }
        .modal-content input { width: 100%; padding: 18px; background: #000; border: 1px solid var(--dourado); color: var(--dourado); border-radius: 12px; text-align: center; font-size: 28px; letter-spacing: 12px; margin-bottom: 25px; box-sizing: border-box; outline: none; }
        .btn-confirm { background: var(--dourado); color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: 900; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h1>PHOTO MOVIE</h1>
        <p>colecionando momentos</p>
    </div>

    <div class="main-container">
        <button id="btn-login" class="btn-central" onclick="abrirModal()">🔓 ACESSAR SISTEMA</button>
        <a href="config_evento.html" id="btn-create" class="btn-protected btn-central btn-create">➕ CRIAR NOVO EVENTO</a>
        <a href="galeria.html" id="btn-galeria" class="btn-protected btn-central">🎞️ ABRIR GALERIA</a>
        
        <div id="container-eventos" class="event-list-container">
            <h3 style="font-size: 12px; color: var(--dourado); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; text-align: center;">Painel de Eventos</h3>
            <div id="lista-eventos"></div>
        </div>

        <button id="btn-lock" class="btn-protected btn-central" onclick="bloquear()" style="background: transparent; color: #ff5555; border: 1px solid rgba(255,85,85,0.3); margin-top: 40px; font-size: 12px;">SAIR DO SISTEMA</button>
    </div>

    <div id="modal-senha">
        <div class="modal-content">
            <h3 style="color:var(--dourado); letter-spacing: 2px;">SENHA MESTRA</h3>
            <input type="password" id="input-senha" inputmode="numeric" placeholder="••••">
            <button class="btn-confirm" onclick="validarSenha()">ENTRAR</button>
            <p onclick="fecharModal()" style="margin-top:20px; font-size:13px; color:#999; cursor:pointer">Voltar</p>
        </div>
    </div>

<script>
    const SENHA_MESTRA = "1234"; 
    const WORKER_URL = "https://photomovie.maxprimefotovideo.workers.dev";

    window.onload = () => { if(sessionStorage.getItem('logado') === 'true') liberarSistema(); }

    function abrirModal() { document.getElementById('modal-senha').style.display = 'flex'; document.getElementById('input-senha').focus(); }
    function fecharModal() { document.getElementById('modal-senha').style.display = 'none'; document.getElementById('input-senha').value = ''; }

    function validarSenha() {
        if (document.getElementById('input-senha').value === SENHA_MESTRA) {
            sessionStorage.setItem('logado', 'true');
            fecharModal();
            liberarSistema();
        } else { alert("Senha Incorreta"); }
    }

    function liberarSistema() {
        document.getElementById('btn-login').style.display = 'none';
        document.querySelectorAll('.btn-protected').forEach(b => b.style.display = 'block');
        document.getElementById('container-eventos').style.display = 'block';
        renderEventos();
    }

    async function renderEventos() {
        const container = document.getElementById('lista-eventos');
        const eventoAtivoConfig = JSON.parse(localStorage.getItem('config_atual'));

        try {
            const res = await fetch(`${WORKER_URL}/listar-eventos`);
            const eventos = await res.json();
            if(!eventos || eventos.length === 0) { container.innerHTML = '<p style="text-align:center; opacity:0.5;">Vazio.</p>'; return; }

            container.innerHTML = '';
            eventos.forEach((ev) => {
                // Checa se este evento é o que está ativo no localStorage
                const estaAtivo = eventoAtivoConfig && eventoAtivoConfig.id === ev.id;
                
                const card = document.createElement('div');
                card.className = `event-card ${estaAtivo ? 'active-border' : ''}`;
                
                card.innerHTML = `
                    <div class="event-info" onclick="irParaCamera(${JSON.stringify(ev).replace(/"/g, '&quot;')})" style="cursor:pointer">
                        <h4>${ev.nome.replace(/_/g, ' ')}</h4>
                        <span>DATA: ${ev.data || '--/--/--'} | DURAÇÃO: ${ev.tempo}s</span>
                    </div>
                    <div class="group-actions-row">
                        <button class="status-btn ${estaAtivo ? 'btn-is-on' : 'btn-is-off'}" onclick='alternarAtivacao(${JSON.stringify(ev).replace(/"/g, '&quot;')})'>
                            ${estaAtivo ? '● EVENTO ATIVO' : '○ ATIVAR GALERIA'}
                        </button>
                        <button class="btn-edit-big" onclick="window.location.href='config_evento.html?id=${ev.id}'">EDITAR</button>
                        <button class="btn-del-big" onclick="excluirEvento('${ev.id}', '${ev.nome}')">×</button>
                    </div>
                `;
                container.appendChild(card);
            });
        } catch (err) { container.innerHTML = '<p>Erro de conexão.</p>'; }
    }

    // FUNCAO QUE DEFINE QUAL EVENTO A GALERIA VAI PUXAR
    function alternarAtivacao(evento) {
        const atual = JSON.parse(localStorage.getItem('config_atual'));
        
        if (atual && atual.id === evento.id) {
            // Se clicar no que já está ativo, ele desativa (Galeria fica vazia)
            localStorage.removeItem('config_atual');
            alert("Galeria Desativada.");
        } else {
            // Define este evento como o único ativo
            localStorage.setItem('config_atual', JSON.stringify(evento));
            alert("Galeria vinculada ao evento: " + evento.nome);
        }
        renderEventos();
    }

    function irParaCamera(evento) {
        localStorage.setItem('config_atual', JSON.stringify(evento));
        window.location.href = 'camera.html';
    }

    async function excluirEvento(id, nome) {
        if(confirm(`Excluir ${nome}?`)) {
            try { 
                await fetch(`${WORKER_URL}/excluir-evento?id=${id}&evento=${nome}`); 
                const atual = JSON.parse(localStorage.getItem('config_atual'));
                if(atual && atual.id === id) localStorage.removeItem('config_atual');
                renderEventos(); 
            } catch (e) { alert("Erro."); }
        }
    }

    function bloquear() { sessionStorage.removeItem('logado'); location.reload(); }
</script>
</body>
</html>
