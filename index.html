<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHOTO MOVIE - Pro v4 Final</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { 
            --neon-purple: #9200ff; 
            --neon-orange: #ff8c00;
            --neon-red: #ff0000;
            --dark-bg: #000; 
        }
        
        body { margin: 0; background: var(--dark-bg); font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; }
        .screen { display: none; min-height: 100vh; width: 100vw; flex-direction: column; align-items: center; position: absolute; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .active { display: flex; }

        /* 4. TÍTULO E SUBTITULO FIXOS */
        .brand-fixed { 
            position: fixed; top: 0; left: 0; width: 100%; text-align: center; 
            padding-top: 30px; background: linear-gradient(to bottom, black, transparent);
            z-index: 999; pointer-events: none;
        }
        .neon-title { 
            font-size: 3rem; font-weight: 900; color: var(--neon-purple);
            text-shadow: 0 0 15px var(--neon-purple); animation: pulse 1s infinite alternate; margin: 0;
        }
        .subtitle { letter-spacing: 5px; font-size: 0.8rem; animation: pulse 1.2s infinite alternate; }
        @keyframes pulse { from { opacity: 0.8; transform: scale(1); } to { opacity: 1; transform: scale(1.02); } }

        .home-center { flex: 1; display: flex; align-items: center; justify-content: center; margin-top: 80px; }

        .btn-main { 
            background: var(--neon-purple); color: white; border: none; padding: 18px 40px; 
            border-radius: 40px; font-weight: bold; cursor: pointer; text-transform: uppercase; 
            box-shadow: 0 0 15px var(--neon-purple); width: 280px; margin: 15px 0;
        }

        /* 3. ESPAÇAMENTO EVENTOS */
        .event-list { margin-top: 150px; width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 20px; }
        .event-card { background: #111; padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }

        /* 7. BOTÃO VOLTAR SUBIU */
        .footer-nav { position: fixed; bottom: 80px; width: 100%; display: flex; justify-content: center; z-index: 900; }

        /* CAMERA */
        #video-preview { display: none; }
        #cam-canvas { width: 100vw; height: 100vh; object-fit: cover; }
        .cam-controls { position: absolute; bottom: 60px; width: 90%; display: flex; align-items: center; justify-content: space-between; z-index: 100; }
        .shutter-btn { width: 80px; height: 80px; border: 5px solid white; border-radius: 50%; box-shadow: 0 0 20px var(--neon-purple); }
        #countdown-display { font-size: 8rem; font-weight: 900; position: absolute; top: 40%; z-index: 200; pointer-events: none; }

        /* GALERIA */
        .gallery-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; margin-top: 130px; padding-bottom: 200px; }
        .video-card { aspect-ratio: 9/16; background: #111; border-radius: 10px; overflow: hidden; position: relative; border: 1px solid #333; }
        .video-card video { width: 100%; height: 100%; object-fit: cover; }

        #modal-qr { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #qrcode-box { background: white; padding: 15px; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="brand-fixed">
        <h1 class="neon-title">PHOTO MOVIE</h1>
        <div class="subtitle">COLECIONANDO MOMENTOS</div>
    </div>

    <div id="screen-home" class="screen active">
        <div class="home-center">
            <button class="btn-main" onclick="nav('screen-menu')">INICIAR</button>
        </div>
    </div>

    <div id="screen-menu" class="screen">
        <div class="event-list">
            <button class="btn-main" style="background:white; color:black; margin-bottom: 30px;" onclick="nav('screen-config')">+ NOVO EVENTO</button>
            <div id="lista-eventos"></div>
        </div>
        <div class="footer-nav">
            <button class="btn-main" style="background:#222; width: 200px;" onclick="nav('screen-home')">VOLTAR</button>
        </div>
    </div>

    <div id="screen-config" class="screen">
        <div style="margin-top: 150px; width: 100%; max-width: 400px;">
            <label>NOME DO EVENTO</label>
            <input type="text" id="cfg-nome" style="width:100%; padding:15px; background:#111; border:1px solid #333; color:white; border-radius:10px; margin: 10px 0;">
            <label>MOLDURA (.PNG)</label>
            <input type="file" id="cfg-frame" accept="image/png" onchange="previewMoldura(this)" style="margin: 15px 0;">
            <button class="btn-main" style="width:100%" onclick="salvarEvento()">CRIAR AGORA</button>
        </div>
        <div class="footer-nav">
            <button class="btn-main" style="background:#222; width: 200px;" onclick="nav('screen-menu')">CANCELAR</button>
        </div>
    </div>

    <div id="screen-camera" class="screen" style="padding:0; overflow: hidden;">
        <canvas id="cam-canvas"></canvas>
        <video id="video-preview" autoplay playsinline muted></video>
        <div id="countdown-display" style="display:none">3</div>
        <div id="timer" style="position:absolute; top:130px; font-size:2rem; font-weight:bold; z-index:100">00s</div>
        
        <div class="cam-controls">
            <div onclick="nav('screen-menu')" style="color:var(--neon-purple); font-size:35px; cursor:pointer">❮</div>
            <div class="shutter-btn" id="shutter" onclick="preStartRec()"></div>
            <div style="width:40px"></div> 
        </div>

        <div id="finish-overlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.8); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:1000">
            <div id="warning-msg" style="font-size:3rem; font-weight:900;"></div>
        </div>
    </div>

    <div id="screen-gallery" class="screen">
        <div id="gallery-container" class="gallery-grid"></div>
        <div class="footer-nav">
            <button class="btn-main" style="background:#222; width: 200px;" onclick="nav('screen-menu')">VOLTAR</button>
        </div>
    </div>

    <div id="modal-qr">
        <div id="qrcode-box"></div>
        <button class="btn-main" style="margin-top:30px" onclick="document.getElementById('modal-qr').style.display='none'">FECHAR</button>
    </div>

<script>
    let db;
    let activeEvId = null;
    let stream, recorder, chunks = [];
    let canvas = document.getElementById('cam-canvas');
    let ctx = canvas.getContext('2d');
    let video = document.getElementById('video-preview');
    let frameImg = new Image();

    const req = indexedDB.open("PhotoMovieDB", 1);
    req.onupgradeneeded = e => {
        db = e.target.result;
        db.createObjectStore("eventos", { keyPath: "id" });
        db.createObjectStore("movies", { keyPath: "id", autoIncrement: true }).createIndex("evId", "evId");
    };
    req.onsuccess = e => { db = e.target.result; renderEventos(); };

    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'screen-camera') startCamera();
        if(id === 'screen-gallery') renderGallery();
    }

    function previewMoldura(i) {
        if(i.files[0]) {
            const reader = new FileReader();
            reader.onload = e => window.tempFrame = e.target.result;
            reader.readAsDataURL(i.files[0]);
        }
    }

    function salvarEvento() {
        const nome = document.getElementById('cfg-nome').value;
        if(!nome || !window.tempFrame) return alert("Erro: Nome e Moldura!");
        const ev = { id: Date.now(), nome, frame: window.tempFrame };
        db.transaction("eventos", "readwrite").objectStore("eventos").add(ev).onsuccess = () => {
            renderEventos(); nav('screen-menu');
        };
    }

    function renderEventos() {
        const list = document.getElementById('lista-eventos');
        list.innerHTML = "";
        db.transaction("eventos", "readonly").objectStore("eventos").getAll().onsuccess = e => {
            e.target.result.forEach(ev => {
                list.innerHTML += `
                    <div class="event-card">
                        <span>${ev.nome}</span>
                        <div>
                            <button onclick="abrirEvento(${ev.id})" style="background:var(--neon-purple); border:none; color:white; padding:10px 20px; border-radius:10px; font-weight:bold">ABRIR</button>
                            <button onclick="deletarEvento(${ev.id})" style="background:none; border:none; color:red; margin-left:10px; font-size:20px">🗑️</button>
                        </div>
                    </div>`;
            });
        };
    }

    function deletarEvento(id) {
        if(confirm("Excluir evento e vídeos?")) {
            db.transaction("eventos", "readwrite").objectStore("eventos").delete(id).onsuccess = () => renderEventos();
        }
    }

    function abrirEvento(id) {
        activeEvId = id;
        db.transaction("eventos", "readonly").objectStore("eventos").get(id).onsuccess = e => {
            frameImg.src = e.target.result.frame;
            nav('screen-camera');
        };
    }

    async function startCamera() {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 720, height: 1280 }, audio: false });
        video.srcObject = stream;
        canvas.width = 720; canvas.height = 1280;
        draw();
    }

    function draw() {
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        if(frameImg.src) ctx.drawImage(frameImg, 0, 0, canvas.width, canvas.height);
        if(document.getElementById('screen-camera').classList.contains('active')) requestAnimationFrame(draw);
    }

    function preStartRec() {
        let c = 3;
        const disp = document.getElementById('countdown-display');
        disp.style.display = 'block';
        disp.innerText = c;
        let t = setInterval(() => {
            c--;
            if(c<=0) { clearInterval(t); disp.style.display='none'; startRec(); }
            else disp.innerText = c;
        }, 1000);
    }

    function startRec() {
        chunks = [];
        const recStream = canvas.captureStream(30);
        recorder = new MediaRecorder(recStream, { mimeType: 'video/webm;codecs=vp8' });
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = async () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            const reader = new FileReader();
            reader.onload = e => {
                db.transaction("movies", "readwrite").objectStore("movies").add({ evId: activeEvId, video: e.target.result });
                nav('screen-gallery');
            };
            reader.readAsDataURL(blob);
        };
        recorder.start();

        let time = 10;
        const over = document.getElementById('finish-overlay');
        const msg = document.getElementById('warning-msg');
        over.style.display = 'flex';
        msg.innerText = "";

        let intv = setInterval(() => {
            time--;
            document.getElementById('timer').innerText = time.toString().padStart(2,'0')+"s";
            if(time <= 3 && time > 0) { msg.innerText = "FINALIZANDO..."; msg.style.color = "var(--neon-orange)"; }
            if(time <= 0) {
                clearInterval(intv); recorder.stop();
                msg.innerText = "FINALIZOU!"; msg.style.color = "var(--neon-red)";
                setTimeout(() => over.style.display='none', 1000);
            }
        }, 1000);
    }

    function renderGallery() {
        const cont = document.getElementById('gallery-container');
        cont.innerHTML = "";
        db.transaction("movies", "readonly").objectStore("movies").index("evId").openCursor(IDBKeyRange.only(activeEvId)).onsuccess = e => {
            const cursor = e.target.result;
            if (cursor) {
                const videoData = cursor.value.video;
                cont.innerHTML += `
                    <div class="video-card">
                        <video src="${videoData}" controls></video>
                        <div style="display:flex; flex-direction:column; gap:5px; padding:5px;">
                            <button onclick="abrirQR('${videoData}')" style="background:var(--neon-purple); border:none; color:white; padding:12px; border-radius:5px; font-weight:bold; font-size:16px;">QR CODE</button>
                            <button onclick="baixar('${videoData}')" style="background:#333; color:#ccc; border:none; padding:5px; font-size:10px; border-radius:3px;">BAIXAR VÍDEO</button>
                        </div>
                    </div>`;
                cursor.continue();
            }
        };
    }

    function abrirQR(url) {
        document.getElementById('qrcode-box').innerHTML = "";
        new QRCode(document.getElementById("qrcode-box"), { text: url, width: 220, height: 220 });
        document.getElementById('modal-qr').style.display = 'flex';
    }

    function baixar(url) {
        const a = document.createElement('a'); a.href = url; a.download = 'movie_with_frame.webm'; a.click();
    }
</script>
</body>
</html>
