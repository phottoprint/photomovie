<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHOTO MOVIE - Ultra Purple</title>
    <style>
        :root { 
            --neon-purple: #9d00ff; /* Roxo mais profundo e forte */
            --neon-glow: #6a00ff;
            --dark-bg: #000000;
        }
        
        body { margin: 0; background: var(--dark-bg); font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; }

        /* NAVEGAÇÃO: Prevenindo fechamento acidental */
        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; align-items: center; position: absolute; padding-top: 40px; box-sizing: border-box; }
        .active { display: flex; }

        /* 1. TÍTULO E SUBTÍTULO MAIS PARA CIMA */
        .brand-container { text-align: center; margin-top: -10px; }
        .neon-title { 
            font-size: 3.2rem; font-weight: 900; color: var(--neon-purple);
            text-shadow: 0 0 10px var(--neon-purple), 0 0 20px var(--neon-glow), 0 0 40px var(--neon-glow);
            animation: pulse-border 2s infinite; margin: 0;
        }
        @keyframes pulse-border {
            0% { text-shadow: 0 0 10px var(--neon-purple), 0 0 20px var(--neon-glow); transform: scale(1); }
            50% { text-shadow: 0 0 20px var(--neon-purple), 0 0 40px var(--neon-glow), 0 0 60px var(--neon-purple); transform: scale(1.02); }
            100% { text-shadow: 0 0 10px var(--neon-purple), 0 0 20px var(--neon-glow); transform: scale(1); }
        }
        .subtitle { font-size: 1rem; color: #fff; letter-spacing: 5px; margin-top: 10px; text-transform: uppercase; }

        /* 8. SEQUÊNCIA DE BOTÕES */
        .menu-container { width: 90%; max-width: 350px; display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        .btn-main { 
            background: var(--neon-purple); color: white; border: none; padding: 16px; 
            border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 0 15px rgba(157, 0, 255, 0.4); font-size: 14px;
        }

        /* 4. LISTA DE EVENTOS CRIADOS */
        .event-list-scroll { width: 100%; max-height: 200px; overflow-y: auto; margin-top: 10px; }
        .event-card { 
            background: #111; border-left: 4px solid var(--neon-purple); 
            padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;
        }

        /* 2. MOSTRUÁRIO DA MOLDURA */
        .frame-preview-container {
            width: 120px; height: 213px; border: 1px solid var(--neon-purple);
            margin: 15px auto; background-size: contain; background-repeat: no-repeat;
            background-position: center; display: none; background-color: #050505;
        }

        /* 6. AVISO FINALIZANDO */
        #finish-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); 
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; 
        }
        .warning-text { color: #ff0000; font-size: 2.5rem; font-weight: 900; animation: blink 0.4s infinite; text-align: center; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } }

        /* 4. CÂMERA FULL */
        .camera-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        #video-preview { width: 100%; height: 100%; object-fit: cover; }
        #overlay-camera { position: absolute; inset: 0; pointer-events: none; background-size: 100% 100%; z-index: 5; }

        /* 7. GALERIA COM CAPA */
        .gallery-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; padding: 10px; }
        .video-thumb { width: 100%; aspect-ratio: 9/16; background: #222; border-radius: 8px; overflow: hidden; position: relative; border: 1px solid #333; }
        .video-thumb video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="screen-home" class="screen active">
        <div class="brand-container">
            <h1 class="neon-title">PHOTO MOVIE</h1>
            <div class="subtitle">colecionando momentos</div>
        </div>

        <div class="menu-container">
            <button class="btn-main" onclick="nav('screen-config')" style="background: #fff; color: #000;">+ NOVO EVENTO</button>
            <button class="btn-main" style="background: transparent; border: 1px solid var(--neon-purple);" onclick="nav('screen-gallery')">GALERIA</button>
            
            <div style="font-size: 12px; color: var(--neon-purple); margin-top: 10px;">EVENTOS DISPONÍVEIS:</div>
            <div class="event-list-scroll" id="lista-eventos">
                </div>
        </div>
    </div>

    <div id="screen-config" class="screen">
        <div style="width: 90%; max-width: 400px; background: #111; padding: 20px; border-radius: 15px;">
            <label>NOME DO EVENTO</label>
            <input type="text" id="cfg-nome" style="width:100%; padding:10px; margin: 10px 0; background:#000; border:1px solid #333; color:#fff;">
            
            <label>MOLDURA (1080x1920 PNG)</label>
            <input type="file" id="cfg-file" accept="image/png" onchange="previewSelectedFrame(this)">
            
            <div id="frame-preview-box" class="frame-preview-container"></div>

            <button class="btn-main" style="width:100%;" onclick="salvarEvento()">SALVAR EVENTO</button>
            <button class="btn-main" style="width:100%; background: #222; margin-top:10px" onclick="nav('screen-home')">VOLTAR</button>
        </div>
    </div>

    <div id="screen-camera" class="screen" style="padding:0">
        <div class="camera-container">
            <video id="video-preview" autoplay playsinline muted></video>
            <div id="overlay-camera"></div>
        </div>
        <div id="timer" style="position:absolute; top:30px; font-size:2rem; z-index:10; font-weight:bold; text-shadow:0 0 10px #000">00s</div>
        <button id="btn-rec" class="btn-main" style="position:absolute; bottom:40px; z-index:10" onclick="startRec()">GRAVAR</button>

        <div id="finish-overlay">
            <div class="warning-text">FINALIZANDO...</div>
            <button class="btn-main" style="margin-top:20px" onclick="resetAfterRec()">OK / SALVAR</button>
        </div>
    </div>

    <div id="screen-gallery" class="screen">
        <h2 style="color:var(--neon-purple)">GALERIA DE MOVIES</h2>
        <div class="gallery-grid" id="gallery-list"></div>
        <button class="btn-main" onclick="nav('screen-home')">VOLTAR</button>
    </div>

<script>
    let state = { eventos: [], movies: [], activeEvent: null };

    // 3. CONTROLE DE VOLTAR (Navegação via Hash para não fechar)
    window.addEventListener('popstate', () => {
        const screen = location.hash.replace('#','') || 'screen-home';
        nav(screen, false);
    });

    function nav(id, updateHash = true) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(updateHash) location.hash = id;
    }

    function previewSelectedFrame(input) {
        if(input.files[0]) {
            const url = URL.createObjectURL(input.files[0]);
            const box = document.getElementById('frame-preview-box');
            box.style.backgroundImage = `url(${url})`;
            box.style.display = 'block';
            state.tempFrameUrl = url;
        }
    }

    function salvarEvento() {
        const nome = document.getElementById('cfg-nome').value;
        if(!nome || !state.tempFrameUrl) return alert("Preencha nome e moldura!");
        
        state.eventos.push({ id: Date.now(), nome, frame: state.tempFrameUrl });
        updateEventList();
        nav('screen-home');
    }

    function updateEventList() {
        const list = document.getElementById('lista-eventos');
        list.innerHTML = state.eventos.map(ev => `
            <div class="event-card">
                <span>${ev.nome}</span>
                <button onclick="openEvent(${ev.id})" style="background:var(--neon-purple); border:none; color:#fff; padding:5px 10px; border-radius:5px">ABRIR</button>
            </div>
        `).join('');
    }

    async function openEvent(id) {
        state.activeEvent = state.eventos.find(e => e.id === id);
        nav('screen-camera');
        document.getElementById('overlay-camera').style.backgroundImage = `url(${state.activeEvent.frame})`;
        
        // Otimização de câmera para não travar
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 30 } } 
        });
        document.getElementById('video-preview').srcObject = stream;
        window.recorderStream = stream;
    }

    function startRec() {
        let chunks = [];
        const recorder = new MediaRecorder(window.recorderStream);
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/mp4' });
            state.movies.push({ id: Date.now(), url: URL.createObjectURL(blob) });
            renderGallery();
        };

        recorder.start();
        document.getElementById('btn-rec').disabled = true;

        let time = 10; // Exemplo 10s
        let interval = setInterval(() => {
            time--;
            document.getElementById('timer').innerText = time.toString().padStart(2,'0')+"s";
            
            // 6. AVISO 3 SEGUNDOS ANTES
            if(time <= 3 && time > 0) {
                document.getElementById('finish-overlay').style.display = 'flex';
            }

            if(time <= 0) {
                clearInterval(interval);
                recorder.stop();
            }
        }, 1000);
    }

    function resetAfterRec() {
        document.getElementById('finish-overlay').style.display = 'none';
        document.getElementById('btn-rec').disabled = false;
        nav('screen-home');
    }

    // 7. GALERIA COM CAPA (VIDEO PREVIEW)
    function renderGallery() {
        const container = document.getElementById('gallery-list');
        container.innerHTML = state.movies.map(m => `
            <div class="video-thumb">
                <video src="${m.url}" muted onmouseover="this.play()" onmouseout="this.pause()"></video>
                <a href="${m.url}" download style="position:absolute; bottom:5px; right:5px; background:var(--neon-purple); color:#fff; font-size:10px; padding:3px; text-decoration:none; border-radius:3px">SALVAR</a>
            </div>
        `).join('');
    }
</script>
</body>
</html>
